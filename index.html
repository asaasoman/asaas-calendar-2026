<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تحدّي توقعات كأس العالم 2026</title>
<style>
:root{
  --green-dark:#315C3B;
  --green-darker:#234430;
  --bg-warm:#F4EFE6;
  --gold:#C9A646;
  --gold-light:#E2C878;
  --card:#FFFDF8;
  --text-dark:#3A2A1D;
  --radius:18px;
  --shadow:0 6px 22px rgba(58,42,29,0.10);
}
[data-theme="dark"]{
  --bg-warm:#1B2420;
  --card:#23302A;
  --text-dark:#F1E9DA;
  --shadow:0 6px 22px rgba(0,0,0,0.35);
}
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:'Tahoma','Segoe UI',sans-serif;
  background:var(--bg-warm);
  color:var(--text-dark);
  transition:background .3s,color .3s;
}
a{color:inherit;}
img.flag{width:28px;height:20px;object-fit:cover;border-radius:4px;box-shadow:0 0 0 1px rgba(0,0,0,.15);vertical-align:middle;}
img.flag.lg{width:46px;height:32px;border-radius:6px;}

/* HERO */
.hero{
  background:linear-gradient(135deg,var(--green-dark),var(--green-darker));
  color:#FFFDF8;
  padding:46px 18px 34px;
  text-align:center;
  border-radius:0 0 28px 28px;
  position:relative;
  overflow:hidden;
}
.hero h1{margin:0 0 8px;font-size:clamp(22px,4vw,34px);}
.hero p{margin:0 auto 18px;max-width:560px;opacity:.92;font-size:15px;}
.hero .quicklinks{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:18px;}
.hero .quicklinks button{
  background:rgba(255,255,255,.12);
  border:1px solid rgba(255,255,255,.35);
  color:#fff;
  padding:7px 14px;
  border-radius:999px;
  cursor:pointer;
  font-size:13px;
}
.hero .quicklinks button:hover{background:rgba(255,255,255,.25);}
.flagstrip{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:14px;opacity:.9;}
.countdown{
  display:inline-flex;gap:10px;align-items:center;
  background:rgba(255,255,255,.1);
  border:1px solid var(--gold);
  padding:10px 18px;border-radius:14px;font-size:13px;
}
.countdown b{color:var(--gold-light);font-size:15px;}

/* TABS */
.tabbar{
  display:flex;gap:8px;justify-content:center;flex-wrap:wrap;
  padding:16px 10px;position:sticky;top:0;z-index:50;
  background:var(--bg-warm);
}
.tabbar button{
  border:none;background:var(--card);color:var(--text-dark);
  padding:10px 18px;border-radius:14px;cursor:pointer;font-size:14px;
  box-shadow:var(--shadow);font-weight:bold;
}
.tabbar button.active{background:var(--green-dark);color:#fff;}
.darkbtn{
  border:none;background:var(--card);box-shadow:var(--shadow);
  padding:10px 14px;border-radius:14px;cursor:pointer;
}

.wrap{max-width:1000px;margin:0 auto;padding:6px 14px 60px;}

/* CARDS */
.card{
  background:var(--card);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:18px 20px;
  margin-bottom:20px;
}
.card h2{margin-top:0;font-size:18px;color:var(--green-dark);display:flex;gap:8px;align-items:center;}
[data-theme="dark"] .card h2{color:var(--gold-light);}

/* LOGIN */
.login-box{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.login-box input{
  flex:1;min-width:180px;padding:10px 14px;border-radius:12px;
  border:1px solid #d8cdb8;background:#fff;font-size:14px;
}
.login-box button{
  background:var(--green-dark);color:#fff;border:none;padding:10px 20px;
  border-radius:12px;cursor:pointer;font-weight:bold;
}
.welcome-bar{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;font-size:14px;}
.welcome-bar button{background:transparent;border:1px solid var(--green-dark);color:var(--green-dark);border-radius:10px;padding:6px 12px;cursor:pointer;}
[data-theme="dark"] .welcome-bar button{color:var(--gold-light);border-color:var(--gold-light);}

/* STAGE CARD */
.stage-card{margin-bottom:24px;}
.stage-head{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
.stage-head .stname{font-size:17px;font-weight:bold;color:var(--green-dark);}
[data-theme="dark"] .stage-head .stname{color:var(--gold-light);}
.stage-status{font-size:12px;padding:4px 10px;border-radius:999px;background:#eee;}
.stage-status.open{background:#d9f0e0;color:#1d6b3a;}
.stage-status.closed{background:#f3dcdc;color:#9a2c2c;}

.match{
  display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center;
  background:rgba(0,0,0,0.025);border-radius:14px;padding:12px;margin-bottom:10px;
}
[data-theme="dark"] .match{background:rgba(255,255,255,0.03);}
.team{display:flex;align-items:center;gap:8px;font-size:14px;}
.team.away{flex-direction:row-reverse;text-align:left;}
.scorebox{display:flex;align-items:center;gap:6px;justify-content:center;}
.scorebox input{
  width:42px;text-align:center;padding:6px 0;border-radius:8px;border:1px solid #d8cdb8;font-size:15px;
}
.scorebox input:disabled{background:#eee;}
.match .vs{font-size:12px;opacity:.6;}
.match-meta{grid-column:1/-1;display:flex;justify-content:space-between;flex-wrap:wrap;gap:6px;font-size:12px;opacity:.75;}
.pen-row{grid-column:1/-1;display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:#fbf3df;border-radius:10px;padding:8px 12px;font-size:13px;}
[data-theme="dark"] .pen-row{background:#3a3120;}
.pen-row select{padding:5px 8px;border-radius:8px;border:1px solid #d8cdb8;}
.locked-tag{grid-column:1/-1;font-size:12px;color:#9a2c2c;font-weight:bold;}
.result-row{grid-column:1/-1;display:flex;gap:14px;flex-wrap:wrap;font-size:12px;background:#eef5ee;border-radius:10px;padding:6px 12px;}
[data-theme="dark"] .result-row{background:#1d2b22;}

.save-btn{
  display:block;width:100%;margin-top:6px;padding:12px;border:none;border-radius:14px;
  background:linear-gradient(135deg,var(--gold),var(--gold-light));color:#3A2A1D;font-weight:bold;
  font-size:15px;cursor:pointer;
}
.save-msg{text-align:center;font-size:13px;margin-top:8px;min-height:18px;}
.save-msg.ok{color:#1d6b3a;}
.save-msg.err{color:#9a2c2c;}

/* LEADERBOARD */
.lb-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.lb-tabs button{border:none;background:#eee;padding:6px 14px;border-radius:999px;cursor:pointer;font-size:13px;}
.lb-tabs button.active{background:var(--green-dark);color:#fff;}
.champion-card{
  text-align:center;background:linear-gradient(135deg,var(--gold-light),var(--gold));
  border-radius:16px;padding:18px;margin-bottom:16px;color:#3A2A1D;
}
.champion-card h3{margin:4px 0;}
table.lb{width:100%;border-collapse:collapse;font-size:14px;}
table.lb th,table.lb td{padding:9px 8px;text-align:right;border-bottom:1px solid rgba(0,0,0,.07);}
table.lb tr:first-child td{font-weight:bold;}
.rank-badge{display:inline-block;width:24px;height:24px;border-radius:50%;background:var(--green-dark);color:#fff;text-align:center;line-height:24px;font-size:12px;}
.icon-btn{border:none;background:transparent;cursor:pointer;font-size:15px;margin:0 3px;}

/* BRACKET */
.bracket-toggle{display:flex;gap:8px;margin-bottom:16px;}
.bracket-toggle button{border:none;background:#eee;padding:6px 14px;border-radius:999px;cursor:pointer;font-size:13px;}
.bracket-toggle button.active{background:var(--green-dark);color:#fff;}
.bracket-scroll{overflow-x:auto;padding-bottom:10px;}
.bracket{display:flex;gap:26px;min-width:760px;}
.bcol{display:flex;flex-direction:column;justify-content:space-around;gap:14px;min-width:160px;}
.bcol .blabel{text-align:center;font-size:12px;font-weight:bold;color:var(--green-dark);margin-bottom:4px;}
[data-theme="dark"] .bcol .blabel{color:var(--gold-light);}
.bmatch{background:var(--card);border-radius:10px;box-shadow:var(--shadow);padding:6px 10px;font-size:12px;}
.bmatch div{display:flex;justify-content:space-between;padding:2px 0;}
.bmatch .winner{font-weight:bold;color:var(--green-dark);}
[data-theme="dark"] .bmatch .winner{color:var(--gold-light);}
.list-view .stage-block{margin-bottom:14px;}
.list-view .lv-match{display:flex;justify-content:space-between;background:var(--card);border-radius:10px;padding:8px 12px;margin-bottom:6px;font-size:13px;box-shadow:var(--shadow);}

/* ADMIN */
.admin-warn{background:#fbecec;border:1px solid #e3b8b8;color:#9a2c2c;padding:10px 14px;border-radius:12px;font-size:13px;margin-bottom:14px;}
[data-theme="dark"] .admin-warn{background:#3a2222;border-color:#5a3030;color:#f0c0c0;}
.stage-ctrl{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.stage-ctrl button{border:1px solid #d8cdb8;background:#fff;padding:5px 10px;border-radius:8px;cursor:pointer;font-size:12px;}
.stage-ctrl button.active{background:var(--green-dark);color:#fff;border-color:var(--green-dark);}
.admin-match{background:rgba(0,0,0,.025);border-radius:12px;padding:10px;margin-bottom:8px;}
[data-theme="dark"] .admin-match{background:rgba(255,255,255,.03);}
.admin-match-row{display:grid;grid-template-columns:1fr auto 1fr auto auto;gap:8px;align-items:center;font-size:13px;}
.admin-match-row select,.admin-match-row input{padding:6px;border-radius:8px;border:1px solid #d8cdb8;font-size:13px;}
.admin-match-row input[type=number]{width:50px;text-align:center;}
.log-list{font-size:12px;max-height:160px;overflow:auto;border-top:1px dashed #ccc;margin-top:8px;padding-top:8px;}
.log-list div{padding:3px 0;}
.participants-table{width:100%;border-collapse:collapse;font-size:13px;}
.participants-table th,.participants-table td{padding:7px;border-bottom:1px solid rgba(0,0,0,.07);text-align:right;}
.small-btn{border:none;background:var(--green-dark);color:#fff;padding:4px 9px;border-radius:8px;font-size:11px;cursor:pointer;margin-inline-start:4px;}
.small-btn.del{background:#9a2c2c;}
.hidden{display:none !important;}
.muted{opacity:.6;font-size:12px;}
</style>
</head>
<body>

<div class="hero">
  <h1>🏆 تحدّي توقعات كأس العالم 2026</h1>
  <p>توقع نتائج المباريات، اجمع النقاط، وتابع ترتيبك بين المشاركين</p>
  <div class="quicklinks" id="quickLinks"></div>
  <div class="flagstrip" id="flagStrip"></div>
  <div class="countdown" id="countdownBox">⏱ جاري الحساب…</div>
</div>

<div class="tabbar">
  <button data-tab="predict" class="active">🎯 توقعاتي</button>
  <button data-tab="leaders">🏆 المتصدّرون</button>
  <button data-tab="bracket">🌳 الشجرة الإقصائية</button>
  <button id="adminTabBtn" data-tab="admin" class="hidden">⚙ إدارة النتائج</button>
  <button class="darkbtn" id="darkToggle">🌙</button>
</div>

<div class="wrap">

  <!-- PREDICT TAB -->
  <div id="tab-predict">
    <div class="card" id="loginCard">
      <h2>👋 سجّل اسمك للمشاركة</h2>
      <div class="login-box">
        <input id="nameInput" placeholder="اكتب اسمك الكامل أو لقبك">
        <button id="loginBtn">ابدأ التوقع</button>
      </div>
      <div class="muted" id="loginMsg"></div>
    </div>

    <div class="card hidden" id="welcomeCard">
      <div class="welcome-bar">
        <span>مرحباً، <b id="userNameLabel"></b> 👋</span>
        <button id="logoutBtn">تبديل المستخدم</button>
      </div>
    </div>

    <div id="stagesContainer" class="hidden"></div>
  </div>

  <!-- LEADERS TAB -->
  <div id="tab-leaders" class="hidden">
    <div class="card">
      <div class="lb-tabs" id="lbTabs"></div>
      <div id="championBox"></div>
      <div style="overflow-x:auto;">
        <table class="lb" id="lbTable"></table>
      </div>
    </div>
  </div>

  <!-- BRACKET TAB -->
  <div id="tab-bracket" class="hidden">
    <div class="card">
      <h2>🌳 الشجرة الإقصائية</h2>
      <div class="bracket-toggle">
        <button id="btnTreeView" class="active">عرض الشجرة</button>
        <button id="btnListView">عرض القائمة</button>
      </div>
      <div id="bracketTreeWrap" class="bracket-scroll"></div>
      <div id="bracketListWrap" class="list-view hidden"></div>
    </div>
  </div>

  <!-- ADMIN TAB -->
  <div id="tab-admin" class="hidden">
    <div class="card">
      <h2>⚙ إدارة النتائج</h2>
      <div class="admin-warn">⚠️ أي تعديل على النتائج الرسمية يُحدّث نقاط جميع المشاركين تلقائياً وفوراً.</div>
      <div id="adminStages"></div>
      <div class="log-list" id="updateLog"><b>سجل تحديث النتائج</b></div>
    </div>
    <div class="card">
      <h2>👥 حالة توقعات المشاركين</h2>
      <div style="overflow-x:auto;">
        <table class="participants-table" id="participantsTable"></table>
      </div>
    </div>
  </div>

</div>

<script>
/* ============== DATA ============== */
const WC_STAGES = [
  { id:'r32', name:'دور الـ32', icon:'⚔️', opensAt:'2026-06-28T04:45:00Z', closesAt:'2026-06-28T19:00:00Z', matchCount:16 },
  { id:'r16', name:'دور الـ16', icon:'🛡️', opensAt:'2026-07-04T04:15:00Z', closesAt:'2026-07-04T17:00:00Z', matchCount:8 },
  { id:'qf',  name:'ربع النهائي', icon:'⚡', opensAt:'2026-07-07T22:45:00Z', closesAt:'2026-07-09T20:00:00Z', matchCount:4 },
  { id:'sf',  name:'نصف النهائي', icon:'🔥', opensAt:'2026-07-12T03:45:00Z', closesAt:'2026-07-14T19:00:00Z', matchCount:2 },
  { id:'final', name:'النهائي', icon:'🏆', opensAt:'2026-07-15T21:45:00Z', closesAt:'2026-07-19T19:00:00Z', matchCount:1 }
];
const WC_SCORING = { knockoutWinner:3, knockoutExactBonus:2 };
const WC_KO_ORDER = ['r32','r16','qf','sf','final'];
const WC_KO_FEED = {
  r16:   [[2,5],[0,3],[1,4],[6,7],[11,10],[9,8],[14,13],[12,15]],
  qf:    [[0,1],[4,5],[2,3],[6,7]],
  sf:    [[0,1],[2,3]],
  final: [[0,1]]
};

// Team map: code -> {name (ar), flag (iso2 lowercase)}
const WC_TEAM_MAP = {
  USA:{name:'الولايات المتحدة', flag:'us'}, MEX:{name:'المكسيك', flag:'mx'}, CAN:{name:'كندا', flag:'ca'},
  BRA:{name:'البرازيل', flag:'br'}, ARG:{name:'الأرجنتين', flag:'ar'}, FRA:{name:'فرنسا', flag:'fr'},
  ENG:{name:'إنجلترا', flag:'gb-eng'}, ESP:{name:'إسبانيا', flag:'es'}, GER:{name:'ألمانيا', flag:'de'},
  POR:{name:'البرتغال', flag:'pt'}, NED:{name:'هولندا', flag:'nl'}, BEL:{name:'بلجيكا', flag:'be'},
  ITA:{name:'إيطاليا', flag:'it'}, CRO:{name:'كرواتيا', flag:'hr'}, URU:{name:'الأوروغواي', flag:'uy'},
  COL:{name:'كولومبيا', flag:'co'}, JPN:{name:'اليابان', flag:'jp'}, KOR:{name:'كوريا الجنوبية', flag:'kr'},
  MAR:{name:'المغرب', flag:'ma'}, KSA:{name:'السعودية', flag:'sa'}, QAT:{name:'قطر', flag:'qa'},
  IRN:{name:'إيران', flag:'ir'}, AUS:{name:'أستراليا', flag:'au'}, SEN:{name:'السنغال', flag:'sn'},
  GHA:{name:'غانا', flag:'gh'}, NGA:{name:'نيجيريا', flag:'ng'}, EGY:{name:'مصر', flag:'eg'},
  TUN:{name:'تونس', flag:'tn'}, SUI:{name:'سويسرا', flag:'ch'}, DEN:{name:'الدنمارك', flag:'dk'},
  POL:{name:'بولندا', flag:'pl'}, JOR:{name:'الأردن', flag:'jo'}, RSA:{name:'جنوب أفريقيا', flag:'za'},
  ECU:{name:'الإكوادور', flag:'ec'}, PAN:{name:'بنما', flag:'pa'}, CRC:{name:'كوستاريكا', flag:'cr'},
  NZL:{name:'نيوزيلندا', flag:'nz'}, UZB:{name:'أوزبكستان', flag:'uz'}, CIV:{name:'ساحل العاج', flag:'ci'},
  ALG:{name:'الجزائر', flag:'dz'}, IRQ:{name:'العراق', flag:'iq'}, UAE:{name:'الإمارات', flag:'ae'},
  PAR:{name:'باراغواي', flag:'py'}, NOR:{name:'النرويج', flag:'no'}, SWE:{name:'السويد', flag:'se'},
  COD:{name:'الكونغو الديمقراطية', flag:'cd'}, BIH:{name:'البوسنة والهرسك', flag:'ba'}, AUT:{name:'النمسا', flag:'at'},
  CPV:{name:'الرأس الأخضر', flag:'cv'}
};
const TEAM_CODES = Object.keys(WC_TEAM_MAP);

function flagImg(code, lg){
  const t = WC_TEAM_MAP[code];
  if(!t) return `<span class="muted">؟</span>`;
  return `<img class="flag${lg?' lg':''}" src="https://flagcdn.com/${t.flag}.svg" alt="${t.name}">`;
}
function teamName(code){ return WC_TEAM_MAP[code] ? WC_TEAM_MAP[code].name : '—'; }

/* ============== STORAGE (Firestore-shaped, localStorage-backed) ============== */
const LS_PRED = 'calendar/wc_predictions';
const LS_RES  = 'calendar/wc_results';

function loadPredictions(){
  try{ return JSON.parse(localStorage.getItem(LS_PRED)).value || []; }catch(e){ return []; }
}
function savePredictions(list){
  localStorage.setItem(LS_PRED, JSON.stringify({ value:list }));
}
function loadResults(){
  try{
    const r = JSON.parse(localStorage.getItem(LS_RES)).value;
    if(r) return r;
  }catch(e){}
  const empty = { knockout:{r32:[],r16:[],qf:[],sf:[],final:[]}, stageOverrides:{}, lastUpdate:{} };
  WC_STAGES.forEach(s=>{
    empty.knockout[s.id] = Array.from({length:s.matchCount},()=>({home:null,away:null,homeScore:null,awayScore:null,penWinner:null,kickoffAt:null}));
  });
  // مواجهات دور الـ32 الفعلية المؤكدة (مع نتائج المباريات التي أُقيمت فعلياً حتى الآن)
  const r32Real = [
    {home:'RSA', away:'CAN', homeScore:0, awayScore:1, penWinner:null,           kickoffAt:'2026-06-28T19:00:00Z'}, // م73
    {home:'BRA', away:'JPN', homeScore:2, awayScore:1, penWinner:null,           kickoffAt:'2026-06-29T17:00:00Z'}, // م74
    {home:'GER', away:'PAR', homeScore:1, awayScore:1, penWinner:'PAR',          kickoffAt:'2026-06-29T20:30:00Z'}, // م75
    {home:'NED', away:'MAR', homeScore:1, awayScore:1, penWinner:'MAR',          kickoffAt:'2026-06-30T01:00:00Z'}, // م76
    {home:'CIV', away:'NOR', homeScore:null, awayScore:null, penWinner:null,     kickoffAt:'2026-06-30T17:00:00Z'}, // م77
    {home:'FRA', away:'SWE', homeScore:null, awayScore:null, penWinner:null,     kickoffAt:'2026-06-30T21:00:00Z'}, // م78
    {home:'MEX', away:'ECU', homeScore:null, awayScore:null, penWinner:null,     kickoffAt:'2026-07-01T01:00:00Z'}, // م79
    {home:'ENG', away:'COD', homeScore:null, awayScore:null, penWinner:null,     kickoffAt:'2026-07-01T16:00:00Z'}, // م80
    {home:'BEL', away:'SEN', homeScore:null, awayScore:null, penWinner:null,     kickoffAt:'2026-07-01T20:00:00Z'}, // م81
    {home:'USA', away:'BIH', homeScore:null, awayScore:null, penWinner:null,     kickoffAt:'2026-07-02T00:00:00Z'}, // م82
    {home:'ESP', away:'AUT', homeScore:null, awayScore:null, penWinner:null,     kickoffAt:'2026-07-02T19:00:00Z'}, // م83
    {home:'CRO', away:'POR', homeScore:null, awayScore:null, penWinner:null,     kickoffAt:'2026-07-02T23:00:00Z'}, // م84
    {home:'SUI', away:'ALG', homeScore:null, awayScore:null, penWinner:null,     kickoffAt:'2026-07-03T03:00:00Z'}, // م85
    {home:'AUS', away:'EGY', homeScore:null, awayScore:null, penWinner:null,     kickoffAt:'2026-07-03T18:00:00Z'}, // م86
    {home:'ARG', away:'CPV', homeScore:null, awayScore:null, penWinner:null,     kickoffAt:'2026-07-03T22:00:00Z'}, // م87
    {home:'GHA', away:'COL', homeScore:null, awayScore:null, penWinner:null,     kickoffAt:'2026-07-04T01:30:00Z'}  // م88
  ];
  empty.knockout.r32 = r32Real;
  saveResults(empty);
  return empty;
}
function saveResults(r){ localStorage.setItem(LS_RES, JSON.stringify({ value:r })); }

let RESULTS = loadResults();
let PREDICTIONS = loadPredictions();

/* ============== USER ============== */
const ADMIN_NAME = 'admin';
let currentUser = localStorage.getItem('wc_current_user') || null;

function findParticipant(name){
  return PREDICTIONS.find(p=>p.name.trim().toLowerCase() === name.trim().toLowerCase());
}
function getOrCreateParticipant(name){
  let p = findParticipant(name);
  if(!p){
    p = { id:'u_'+Date.now()+Math.random().toString(36).slice(2,7), name:name.trim(), ts:Date.now(),
      knockout:{r32:[],r16:[],qf:[],sf:[],final:[]} };
    PREDICTIONS.push(p);
    savePredictions(PREDICTIONS);
  }
  return p;
}
function isAdmin(){ return currentUser && currentUser.trim().toLowerCase()===ADMIN_NAME; }

/* ============== STAGE STATE ============== */
function now(){ return new Date(); }
function stageOverride(stageId){ return RESULTS.stageOverrides ? RESULTS.stageOverrides[stageId] : null; }

function matchKickoff(stageId, idx){
  const m = RESULTS.knockout[stageId][idx];
  if(m && m.kickoffAt) return new Date(m.kickoffAt);
  const stage = WC_STAGES.find(s=>s.id===stageId);
  return new Date(stage.closesAt); // fallback
}
function isMatchLocked(stageId, idx){
  const ov = stageOverride(stageId);
  if(ov==='force-close') return true;
  if(ov==='force-open') return false;
  return now() >= matchKickoff(stageId, idx);
}
function isStageOpen(stageId){
  const ov = stageOverride(stageId);
  const stage = WC_STAGES.find(s=>s.id===stageId);
  if(ov==='force-open') return true;
  if(ov==='force-close') return false;
  const n = now();
  return n >= new Date(stage.opensAt) && n <= new Date(stage.closesAt);
}

/* derive teams for a stage match using previous stage winners (for r16+) */
function winnerOf(m){
  if(!m || m.homeScore==null || m.awayScore==null) return null;
  if(m.homeScore > m.awayScore) return m.home;
  if(m.awayScore > m.homeScore) return m.away;
  return m.penWinner || null;
}
function stageMatchTeams(stageId, idx){
  if(stageId==='r32'){
    const m = RESULTS.knockout.r32[idx];
    return { home:m.home, away:m.away, homeLabel:m.home?teamName(m.home):'منتظر', awayLabel:m.away?teamName(m.away):'منتظر' };
  }
  const order = WC_KO_ORDER;
  const prevStage = order[order.indexOf(stageId)-1];
  const feed = WC_KO_FEED[stageId][idx];
  const m1 = RESULTS.knockout[prevStage][feed[0]];
  const m2 = RESULTS.knockout[prevStage][feed[1]];
  const w1 = winnerOf(m1);
  const w2 = winnerOf(m2);
  return {
    home: w1, away: w2,
    homeLabel: w1 ? teamName(w1) : `الفائز من المباراة ${feed[0]+1}`,
    awayLabel: w2 ? teamName(w2) : `الفائز من المباراة ${feed[1]+1}`
  };
}

/* ============== SCORING ============== */
function matchPoints(pred, result){
  if(!pred || result.homeScore==null || result.awayScore==null) return 0;
  const actualWinner = winnerOf(result);
  let predWinner;
  if(pred.homeScore > pred.awayScore) predWinner = result.home;
  else if(pred.awayScore > pred.homeScore) predWinner = result.away;
  else predWinner = pred.penWinner || null;

  if(!actualWinner || predWinner !== actualWinner) return 0;
  let pts = WC_SCORING.knockoutWinner;
  const scoreExact = pred.homeScore===result.homeScore && pred.awayScore===result.awayScore;
  const wasDraw = result.homeScore===result.awayScore;
  if(scoreExact){
    if(wasDraw){
      if(pred.penWinner && result.penWinner && pred.penWinner===result.penWinner) pts += WC_SCORING.knockoutExactBonus;
    } else {
      pts += WC_SCORING.knockoutExactBonus;
    }
  }
  return Math.min(pts, 5);
}
function participantStagePoints(p, stageId){
  let total=0;
  const preds = p.knockout[stageId] || [];
  const results = RESULTS.knockout[stageId] || [];
  for(let i=0;i<results.length;i++){
    total += matchPoints(preds[i], results[i]);
  }
  return total;
}
function participantTotalPoints(p){
  return WC_KO_ORDER.reduce((s,st)=>s+participantStagePoints(p,st),0);
}

function nextClosingMoment(){
  let best=null;
  WC_STAGES.forEach(s=>{
    s_matches: for(let i=0;i<s.matchCount;i++){
      const k = matchKickoff(s.id,i);
      if(k > now() && (!best || k<best)) best = k;
    }
  });
  return best;
}
function updateCountdown(){
  const box = document.getElementById('countdownBox');
  const target = nextClosingMoment();
  if(!target){ box.innerHTML = '⏱ لا توجد مباريات قادمة حالياً'; return; }
  const diff = target - now();
  if(diff<=0){ box.innerHTML='⏱ إغلاق وشيك الآن'; return; }
  const d = Math.floor(diff/86400000);
  const h = Math.floor(diff/3600000)%24;
  const m = Math.floor(diff/60000)%60;
  const sec = Math.floor(diff/1000)%60;
  box.innerHTML = `⏱ أقرب إغلاق توقع خلال: <b>${d}ي ${h}س ${m}د ${sec}ث</b>`;
}

function saveStagePredictions(stageId){
  const stage = WC_STAGES.find(s=>s.id===stageId);
  const msgEl = document.getElementById('savemsg-'+stageId);
  const card = document.getElementById('stage-'+stageId);
  const matchEls = [...card.querySelectorAll('.match')];
  const newPreds = [];
  for(let i=0;i<matchEls.length;i++){
    const el = matchEls[i];
    const hIn = el.querySelector('.sc-home');
    const aIn = el.querySelector('.sc-away');
    const locked = hIn.disabled;
    if(locked){
      const participant = getOrCreateParticipant(currentUser);
      newPreds.push((participant.knockout[stageId]||[])[i] || {homeScore:null,awayScore:null,penWinner:null});
      continue;
    }
    const {home, away} = stageMatchTeams(stageId, i);
    if(!home || !away){
      newPreds.push({homeScore:null,awayScore:null,penWinner:null});
      continue;
    }
    if(hIn.value==='' || aIn.value===''){
      msgEl.textContent = 'حدث خطأ أثناء الحفظ. حاول مرة أخرى.';
      msgEl.className='save-msg err';
      msgEl.textContent = `يجب إدخال نتيجة كاملة لجميع المباريات المفتوحة قبل الحفظ.`;
      return;
    }
    const hs = Number(hIn.value), as = Number(aIn.value);
    let penWinner = null;
    if(hs===as){
      const sel = el.querySelector('.pen-select');
      if(!sel || !sel.value){
        msgEl.className='save-msg err';
        msgEl.textContent = 'في حال التعادل يجب اختيار فائز بركلات الترجيح لجميع المباريات المتعادلة.';
        return;
      }
      penWinner = sel.value;
    }
    newPreds.push({homeScore:hs, awayScore:as, penWinner});
  }

  msgEl.textContent = '⏳ جارٍ الحفظ…';
  msgEl.className='save-msg';
  setTimeout(()=>{
    try{
      const participant = getOrCreateParticipant(currentUser);
      participant.knockout[stageId] = newPreds;
      savePredictions(PREDICTIONS);
      msgEl.textContent = '✓ تم الحفظ بنجاح';
      msgEl.className='save-msg ok';
      renderStages();
      renderLeaders();
    }catch(e){
      msgEl.textContent = 'حدث خطأ أثناء الحفظ. حاول مرة أخرى.';
      msgEl.className='save-msg err';
    }
  }, 250);
}

        if(!isAuto){
          target.home = row.querySelector('.adm-home').value || null;
          target.away = row.querySelector('.adm-away').value || null;
        } else {
          const t = stageMatchTeams(stid, idx);
          target.home = t.home; target.away = t.away;
        }
        const hs = hsIn.value, as = asIn.value;
        target.homeScore = hs===''? null : Number(hs);
        target.awayScore = as===''? null : Number(as);
        const kc = row.querySelector('.adm-kickoff').value;
        target.kickoffAt = kc ? new Date(kc).toISOString() : null;
        const penSel = row.querySelector('.adm-pen');
        target.penWinner = (penSel && penSel.value) ? penSel.value : null;
        RESULTS.lastUpdate[stid+'_'+idx] = Date.now();
        saveResults(RESULTS);
        pushLog(`${stage.icon} ${stage.name} - مباراة ${idx+1}: ${target.homeScore ?? '-'} : ${target.awayScore ?? '-'}`);
        renderAll();
      };
    }
  });
  renderLog();
}
function toLocalInputValue(iso){
  const d = new Date(iso);
  const pad = n=>String(n).padStart(2,'0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function renderAdminParticipants(){
  const table = document.getElementById('participantsTable');
  table.innerHTML = `<tr><th>الاسم</th>${WC_STAGES.map(s=>`<th>${s.icon} ${s.name}</th>`).join('')}<th></th></tr>` +
    PREDICTIONS.map(p=>`
      <tr>
        <td>${p.name}</td>
        ${WC_STAGES.map(s=>{
          const done = (p.knockout[s.id]||[]).filter(x=>x && x.homeScore!=null).length;
          return `<td>${done}/${s.matchCount}</td>`;
        }).join('')}
        <td>
          <button class="small-btn" onclick="viewParticipant('${p.id}')">عرض</button>
          <button class="small-btn" onclick="adminEditParticipant('${p.id}')">تعديل</button>
          <button class="small-btn del" onclick="adminDeleteParticipant('${p.id}')">حذف</button>
        </td>
      </tr>
    `).join('');
}

/* ============== TABS / DARK MODE ============== */
document.querySelectorAll('.tabbar button[data-tab]').forEach(btn=>{
  btn.onclick = ()=>{
    document.querySelectorAll('.tabbar button[data-tab]').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    ['predict','leaders','bracket','admin'].forEach(t=>{
      document.getElementById('tab-'+t).classList.toggle('hidden', t!==btn.dataset.tab);
    });
    if(btn.dataset.tab==='leaders') renderLeaders();
    if(btn.dataset.tab==='bracket'){ renderBracketTree(); renderBracketList(); }
    if(btn.dataset.tab==='admin'){ renderAdminStages(); renderAdminParticipants(); }
  };
});
document.getElementById('darkToggle').onclick = ()=>{
  const html = document.documentElement;
  const dark = html.getAttribute('data-theme')==='dark';
  html.setAttribute('data-theme', dark?'light':'dark');
  document.getElementById('darkToggle').textContent = dark? '🌙':'☀️';
  localStorage.setItem('wc_theme', dark?'light':'dark');
};
if(localStorage.getItem('wc_theme')==='dark'){
  document.documentElement.setAttribute('data-theme','dark');
  document.getElementById('darkToggle').textContent='☀️';
}

/* ============== INIT ============== */
function renderAll(){
  RESULTS = loadResults();
  PREDICTIONS = loadPredictions();
  renderLogin();
  renderLeaders();
  renderBracketTree();
  renderBracketList();
  if(isAdmin()){ renderAdminStages(); renderAdminParticipants(); }
}
renderHero();
renderAll();
</script>
