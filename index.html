<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#315C3B" />
<title>تقويم أساس المؤسسي 2026</title>
<link rel="manifest" href="manifest.webmanifest" />
<style>
/* Co Headline W23 Arabic Regular — host the font file at /fonts/ */
@font-face {
  font-family: 'Co Headline';
  src: url('/fonts/CoHeadlineW23Arabic-Regular.woff2') format('woff2'),
       url('/fonts/CoHeadlineW23Arabic-Regular.woff') format('woff'),
       url('/fonts/CoHeadlineW23Arabic-Regular.ttf') format('truetype'),
       url('/fonts/CoHeadlineW23Arabic-Regular.otf') format('opentype');
  font-weight: 100 900;
  font-style: normal;
  font-display: swap;
}
</style>
<!-- Fallback fonts in case Co Headline doesn't load -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet" />
<style>
/* ============================================================
   ASAAS Corporate Editorial Calendar — 2026
   Premium Corporate + Editorial Calendar Theme
   ============================================================ */

:root {
  --bg: #F4EFE6;
  --bg-2: #EFE7D7;
  --green: #315C3B;
  --green-dark: #244229;
  --green-light: #4A7A55;
  --green-tint: #E6EDE7;
  --text: #3A2A1D;
  --text-soft: #6B5749;
  --text-mute: #968172;
  --beige: #E9DDCA;
  --gold: #C9A646;
  --gold-soft: #E0C77A;
  --gold-tint: #F5EBC9;
  --clay: #B36A3C;
  --clay-soft: #D9966D;
  --card: #FFFDF8;
  --card-2: #FBF6EC;
  --border: #E1D6C5;
  --border-soft: #ECE3D2;
  --danger: #A8423A;
  --shadow-sm: 0 1px 3px rgba(58,42,29,.05), 0 1px 2px rgba(58,42,29,.04);
  --shadow-md: 0 4px 16px rgba(58,42,29,.06), 0 2px 6px rgba(58,42,29,.04);
  --shadow-lg: 0 12px 40px rgba(58,42,29,.10), 0 4px 14px rgba(58,42,29,.06);
  --radius-sm: 8px;
  --radius: 14px;
  --radius-lg: 20px;
  --radius-xl: 28px;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: 'Co Headline', 'Tajawal', 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 15px;
  line-height: 1.55;
  min-height: 100vh;
  background-image:
    radial-gradient(at 90% -10%, rgba(201,166,70,.08) 0, transparent 45%),
    radial-gradient(at -10% 110%, rgba(49,92,59,.06) 0, transparent 50%);
  background-attachment: fixed;
}

.display { font-family: 'Co Headline', 'Tajawal', sans-serif; }
button { font-family: inherit; cursor: pointer; }
input, textarea, select { font-family: inherit; }
::selection { background: var(--gold-soft); color: var(--text); }

/* ---------- App Shell ---------- */
.app { max-width: 1400px; margin: 0 auto; padding: 18px clamp(12px, 2.4vw, 30px) 60px; }

/* ---------- Header ---------- */
.header {
  display: flex; align-items: center; justify-content: space-between;
  gap: 18px;
  padding: 14px 20px;
  background: linear-gradient(180deg, var(--card) 0%, var(--card-2) 100%);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-md);
  position: relative;
  overflow: hidden;
  flex-wrap: wrap;
}
.header::before {
  content: ""; position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent 0%, rgba(201,166,70,.05) 50%, transparent 100%);
  pointer-events: none;
}

.brand { display: flex; align-items: center; gap: 14px; cursor: pointer; user-select: none; }
.brand-mark {
  width: 50px; height: 50px;
  display: grid; place-items: center;
  flex-shrink: 0;
}
.brand-mark img {
  width: 100%; height: 100%;
  object-fit: contain;
  display: block;
}
.brand-text .ar { font-size: 19px; font-weight: 700; color: var(--green-dark); letter-spacing: -.2px; }
.brand-text .en { font-size: 11px; color: var(--text-mute); letter-spacing: 3px; text-transform: uppercase; }

.clock-cluster {
  display: flex; align-items: center; gap: 22px;
  padding: 6px 14px;
  position: relative; z-index: 1;
}
.clock-time {
  font-family: 'Co Headline', 'Tajawal', sans-serif;
  font-size: 32px; font-weight: 700;
  color: var(--green-dark);
  letter-spacing: 1px;
  font-variant-numeric: tabular-nums;
  min-width: 130px;
  text-align: center;
}
.clock-dates { display: flex; flex-direction: column; gap: 2px; }
.clock-date { font-size: 13px; color: var(--text); font-weight: 500; }
.clock-hijri { font-size: 12px; color: var(--clay); font-weight: 500; }

.header-actions { display: flex; gap: 10px; position: relative; z-index: 1; }

.btn {
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--text);
  padding: 10px 18px;
  border-radius: 999px;
  font-size: 14px; font-weight: 500;
  transition: all .2s ease;
  display: inline-flex; align-items: center; gap: 8px;
}
.btn:hover { transform: translateY(-1px); box-shadow: var(--shadow-sm); border-color: var(--gold-soft); }
.btn-primary {
  background: linear-gradient(135deg, var(--green) 0%, var(--green-dark) 100%);
  color: #FFFDF8; border-color: var(--green-dark);
}
.btn-primary:hover { box-shadow: 0 6px 18px rgba(49,92,59,.3); border-color: var(--green-dark); }
.btn-gold {
  background: linear-gradient(135deg, var(--gold) 0%, #B6932F 100%);
  color: #FFFDF8; border-color: #B6932F;
}
.btn-danger { color: var(--danger); border-color: rgba(168,66,58,.3); background: #FBF1F0; }
.btn-danger:hover { background: #F5DDD9; border-color: var(--danger); }
.btn-ghost { background: transparent; border-color: transparent; }
.btn-sm { padding: 6px 12px; font-size: 12.5px; }

.control-menu-wrap { position: relative; }
.admin-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--gold-soft);
  box-shadow: 0 0 0 2px rgba(255,253,248,.3), 0 0 8px var(--gold);
  display: inline-block;
  animation: pulse-dot 2s ease-in-out infinite;
}
@keyframes pulse-dot {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.3); opacity: .7; }
}
#controlBtn.is-admin {
  background: linear-gradient(135deg, var(--gold) 0%, #B6932F 100%);
  border-color: #B6932F;
}
/* Action buttons inside the Control modal */
.control-action {
  display: flex; align-items: center; gap: 12px;
  width: 100%; text-align: right;
  background: var(--card-2); border: 1px solid var(--border-soft);
  padding: 14px 16px; border-radius: 12px;
  font-size: 15px; color: var(--text);
  font-weight: 500;
  transition: all .15s;
  cursor: pointer;
  margin-bottom: 6px;
}
.control-action:last-child { margin-bottom: 0; }
.control-action:hover {
  background: var(--green-tint);
  border-color: var(--green-light);
  transform: translateX(-2px);
}
.control-action .ca-icon {
  width: 36px; height: 36px;
  border-radius: 10px;
  background: var(--green-tint);
  display: grid; place-items: center;
  font-size: 16px;
  color: var(--green-dark);
  flex-shrink: 0;
}
.control-action.danger .ca-icon { background: #FBE8E5; color: var(--danger); }
.control-action.gold .ca-icon { background: var(--gold-tint); color: var(--clay); }
.control-section-label {
  font-size: 11px; font-weight: 700;
  color: var(--text-mute);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin: 14px 4px 8px;
}
.control-section-label:first-child { margin-top: 0; }

/* ---------- News Ticker ---------- */
.news-ticker {
  margin-top: 18px;
  background: linear-gradient(90deg, var(--green-dark) 0%, var(--green) 100%);
  color: #FFFDF8;
  border-radius: var(--radius);
  padding: 12px 18px;
  display: flex; align-items: center; gap: 16px;
  box-shadow: var(--shadow-sm);
  position: relative;
  overflow: hidden;
}
.news-label {
  background: var(--gold);
  color: var(--green-dark);
  font-weight: 700; font-size: 13px;
  padding: 4px 14px;
  border-radius: 999px;
  white-space: nowrap;
  letter-spacing: -.2px;
}
.news-content {
  flex: 1;
  font-size: 14.5px;
  font-weight: 400;
  opacity: .95;
  min-height: 22px;
  animation: fade-in .4s ease;
}
.news-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gold-soft); animation: blink 1.4s infinite; }
@keyframes blink { 0%,100% { opacity: 1 } 50% { opacity: .3 } }

/* ---------- Top Control Row: Spotlight + Filters/Nav + Countdown ---------- */
.top-row {
  margin-top: 18px;
  display: grid;
  grid-template-columns: 220px 1fr 280px;
  gap: 16px;
}
@media (max-width: 1050px) { .top-row { grid-template-columns: 1fr; } }

/* ===== Let's Remember / لنتذكّر — image slider ===== */
.spotlight {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 0;
  overflow: hidden;
  box-shadow: var(--shadow-sm);
  position: relative;
}
.spotlight-label {
  position: absolute; top: 10px; right: 10px; z-index: 4;
  background: rgba(49,92,59,.92); color: #FFFDF8;
  padding: 4px 10px; border-radius: 999px;
  font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
  font-weight: 600;
  backdrop-filter: blur(4px);
}
.spotlight-title {
  position: absolute; bottom: 12px; right: 14px; z-index: 4;
  font-family: 'Co Headline', 'Tajawal', sans-serif;
  font-size: 24px; font-weight: 700;
  color: #FFFDF8;
  text-shadow: 0 2px 14px rgba(0,0,0,.65), 0 1px 3px rgba(0,0,0,.4);
  letter-spacing: -.3px;
}
.spotlight-img-wrap {
  position: relative;
  width: 100%; aspect-ratio: 4/3;
  background: linear-gradient(135deg, var(--beige) 0%, var(--gold-tint) 100%);
  overflow: hidden;
}
/* Soft gradient overlay so title stays readable on any photo */
.spotlight-img-wrap::after {
  content: ""; position: absolute; inset: 0;
  background:
    linear-gradient(0deg, rgba(0,0,0,.65) 0%, rgba(0,0,0,.15) 38%, transparent 60%),
    linear-gradient(180deg, rgba(0,0,0,.25) 0%, transparent 28%);
  pointer-events: none;
  z-index: 2;
}
/* Two stacked images for smooth crossfade */
.spotlight-img {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover; display: block;
  opacity: 0;
  transition: opacity 1s ease;
  z-index: 1;
}
.spotlight-img.active { opacity: 1; }
.spotlight-placeholder {
  position: absolute; inset: 0;
  display: grid; place-items: center;
  color: var(--clay);
  font-family: 'Co Headline', 'Tajawal', sans-serif;
  font-size: 48px; opacity: .35;
  z-index: 0;
}
/* Navigation arrows */
.spot-arrow {
  position: absolute; top: 50%; transform: translateY(-50%);
  z-index: 5;
  width: 32px; height: 32px;
  border-radius: 50%;
  background: rgba(255,253,248,.85);
  border: 1px solid rgba(255,253,248,.6);
  display: grid; place-items: center;
  color: var(--green-dark);
  font-size: 16px; font-weight: 700;
  cursor: pointer;
  opacity: 0;
  transition: opacity .25s, background .15s, transform .15s;
  backdrop-filter: blur(6px);
  box-shadow: 0 2px 8px rgba(0,0,0,.2);
}
.spotlight:hover .spot-arrow { opacity: 1; }
.spot-arrow:hover { background: #FFFDF8; transform: translateY(-50%) scale(1.08); }
.spot-arrow.prev { right: 8px; }
.spot-arrow.next { left: 8px; }
.spot-arrow:focus { opacity: 1; outline: none; }
/* Pagination dots */
.spot-dots {
  position: absolute; bottom: 12px; left: 12px;
  z-index: 5;
  display: flex; gap: 5px;
  align-items: center;
}
.spot-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: rgba(255,253,248,.45);
  border: 0;
  padding: 0;
  cursor: pointer;
  transition: all .25s ease;
}
.spot-dot:hover { background: rgba(255,253,248,.75); }
.spot-dot.active {
  background: var(--gold);
  width: 18px;
  border-radius: 999px;
  box-shadow: 0 0 8px rgba(201,166,70,.6);
}
.spot-empty {
  position: absolute; inset: 0;
  display: grid; place-items: center;
  z-index: 3;
  color: var(--clay);
  text-align: center;
  padding: 16px;
}
.spot-empty .ico { font-size: 44px; opacity: .35; margin-bottom: 8px; }
.spot-empty .txt { font-size: 12px; color: var(--text-mute); }

@media (max-width: 720px) {
  .spot-arrow { opacity: 1; width: 28px; height: 28px; font-size: 14px; }
  .spotlight-title { font-size: 20px; }
}

/* ===== Spotlight admin panel: upload UI ===== */
.spot-drop {
  border: 2px dashed var(--border);
  border-radius: 14px;
  padding: 24px 16px;
  text-align: center;
  background: var(--card-2);
  cursor: pointer;
  transition: all .2s;
}
.spot-drop:hover { border-color: var(--green); background: var(--green-tint); }
.spot-drop.drag { border-color: var(--gold); background: var(--gold-tint); transform: scale(1.01); }
.spot-drop-icon { font-size: 32px; margin-bottom: 6px; }
.spot-drop-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
.spot-drop-sub { font-size: 11.5px; color: var(--text-mute); }

.spot-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 10px;
}
.spot-card {
  background: var(--card-2);
  border: 1px solid var(--border-soft);
  border-radius: 12px;
  overflow: hidden;
  transition: all .15s;
  display: flex;
  flex-direction: column;
}
.spot-card:hover { border-color: var(--gold-soft); box-shadow: var(--shadow-sm); }
.spot-card.disabled { opacity: .5; }
.spot-thumb {
  position: relative;
  width: 100%;
  aspect-ratio: 4/3;
  background: linear-gradient(135deg, var(--beige) 0%, var(--gold-tint) 100%);
  overflow: hidden;
}
.spot-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.spot-thumb.error::after {
  content: "⚠ تعذر تحميل الصورة";
  position: absolute; inset: 0;
  display: grid; place-items: center;
  font-size: 11px; color: var(--danger);
  background: #FBE8E5;
}
.spot-card-body { padding: 8px 10px; flex: 1; }
.spot-card-label {
  font-size: 11px; color: var(--text-soft);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.spot-card-actions {
  display: flex; justify-content: space-between; align-items: center;
  padding: 6px 10px 10px;
  gap: 8px;
}

.month-nav-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 18px;
  box-shadow: var(--shadow-sm);
  display: flex; flex-direction: column; gap: 12px;
}
.month-nav-top {
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
}
.month-title {
  font-family: 'Co Headline', 'Tajawal', sans-serif;
  font-size: 28px; font-weight: 700;
  color: var(--green-dark);
  letter-spacing: -.5px;
}
.month-title .year { color: var(--gold); font-size: 22px; margin-inline-start: 8px; }

.nav-btns { display: flex; gap: 6px; align-items: center; }
.icon-btn {
  width: 36px; height: 36px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--card);
  display: grid; place-items: center;
  color: var(--text);
  font-size: 16px;
  transition: all .15s;
}
.icon-btn:hover { background: var(--green-tint); border-color: var(--green-light); }
.view-toggle {
  display: inline-flex;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 3px;
  background: var(--bg-2);
}
.view-toggle button {
  border: 0; background: transparent;
  padding: 6px 14px; font-size: 13px;
  border-radius: 8px;
  color: var(--text-soft);
  font-weight: 500;
  transition: all .15s;
}
.view-toggle button.active { background: var(--green); color: #FFFDF8; box-shadow: 0 2px 6px rgba(49,92,59,.25); }

.filters {
  display: flex; flex-wrap: wrap; gap: 6px;
  padding-top: 10px;
  border-top: 1px dashed var(--border-soft);
}
.chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 11px;
  border-radius: 999px;
  font-size: 12px; font-weight: 500;
  background: var(--bg-2);
  border: 1px solid var(--border);
  color: var(--text-soft);
  cursor: pointer;
  transition: all .15s;
  user-select: none;
}
.chip:hover { transform: translateY(-1px); }
.chip .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-mute); }
.chip.active { background: var(--card); color: var(--text); border-color: var(--text-soft); font-weight: 600; }
.chip.inactive { opacity: .42; text-decoration: line-through; text-decoration-thickness: 1px; }

.countdown {
  background: linear-gradient(160deg, var(--green-dark) 0%, var(--green) 60%, var(--green-light) 100%);
  color: #FFFDF8;
  border-radius: var(--radius);
  padding: 16px 18px;
  box-shadow: var(--shadow-md), inset 0 0 0 1px rgba(255,253,248,.1);
  position: relative;
  overflow: hidden;
  cursor: pointer;
  transition: transform .2s;
}
.countdown:hover { transform: translateY(-2px); }
.countdown::before {
  content: ""; position: absolute; top: -30px; right: -30px;
  width: 130px; height: 130px;
  background: radial-gradient(circle, var(--gold-soft) 0%, transparent 70%);
  opacity: .25;
}
.countdown-label { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--gold-soft); margin-bottom: 4px; }
.countdown-title { font-family: 'Co Headline', 'Tajawal', sans-serif; font-size: 22px; font-weight: 700; margin-bottom: 2px; }
.countdown-event { font-size: 13.5px; opacity: .9; margin-bottom: 12px; min-height: 19px; }
.countdown-numbers {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px;
  position: relative; z-index: 1;
}
.cd-cell {
  background: rgba(255,253,248,.1);
  border: 1px solid rgba(255,253,248,.18);
  border-radius: 8px;
  padding: 6px 4px;
  text-align: center;
}
.cd-num { font-family: 'Co Headline', 'Tajawal', sans-serif; font-size: 22px; font-weight: 700; line-height: 1; font-variant-numeric: tabular-nums; }
.cd-lbl { font-size: 9.5px; opacity: .75; letter-spacing: 1px; text-transform: uppercase; margin-top: 3px; }
.countdown-empty { font-size: 13px; opacity: .85; padding: 10px 0; text-align: center; }

/* ---------- Calendar Grid ---------- */
.calendar-wrap {
  margin-top: 18px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 22px;
  box-shadow: var(--shadow-md);
}
.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 8px;
}
.cal-head { font-size: 12px; color: var(--text-mute); font-weight: 600; text-align: center; padding: 6px 0; letter-spacing: .5px; }
.cal-cell {
  background: var(--card-2);
  border: 1px solid var(--border-soft);
  border-radius: var(--radius);
  min-height: 100px;
  padding: 8px 10px;
  display: flex; flex-direction: column;
  position: relative;
  transition: all .15s;
  overflow: hidden;
}
.cal-cell.muted { opacity: .35; }
.cal-cell.today { border-color: var(--green); box-shadow: 0 0 0 2px rgba(49,92,59,.18), var(--shadow-sm); background: linear-gradient(160deg, var(--card) 0%, var(--green-tint) 100%); }
.cal-cell.weekend { background: var(--bg-2); }
.cal-cell.admin:hover { background: var(--green-tint); border-color: var(--green-light); cursor: pointer; transform: translateY(-1px); box-shadow: var(--shadow-sm); }
.cell-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.cell-num { font-family: 'Co Headline', 'Tajawal', sans-serif; font-weight: 700; font-size: 19px; color: var(--text); line-height: 1; }
.cal-cell.today .cell-num { color: var(--green-dark); }
.cell-logos { display: flex; gap: 3px; }
.cell-logo {
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--gold-tint);
  display: grid; place-items: center;
  font-size: 9px; font-weight: 700;
  color: var(--green-dark);
  border: 1px solid var(--gold-soft);
  box-shadow: var(--shadow-sm);
  overflow: hidden;
}
.cell-logo img { width: 100%; height: 100%; object-fit: cover; }
.cell-events { display: flex; flex-direction: column; gap: 3px; overflow: hidden; }
.evt-pill {
  font-size: 11.5px;
  padding: 3px 8px;
  border-radius: 6px;
  background: var(--green-tint);
  color: var(--green-dark);
  border-right: 3px solid var(--green);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  cursor: pointer;
  transition: all .12s;
  font-weight: 500;
}
.evt-pill:hover { transform: translateX(-2px); filter: brightness(.96); }
.evt-pill .time { font-size: 10px; opacity: .75; margin-inline-end: 4px; }
.evt-more { font-size: 10.5px; color: var(--text-mute);
