// ── Storage: GitHub Gist (shared across all browsers) ────────────────
//
// HOW TO SET UP (one-time, 2 minutes):
// 1. Go to https://gist.github.com
// 2. Create a new SECRET gist, filename: asaas-data.json, content: {}
// 3. Copy the Gist ID from the URL (the long hash after your username)
// 4. Go to https://github.com/settings/tokens → Generate new token (classic)
//    → check only "gist" scope → copy the token
// 5. On the survey page, click ⚙ Setup in the nav (visible when logged in)
//    and paste both values — they'll be saved locally and used for sync.
//
// After setup: ALL browsers read/write the same Gist → always in sync.

function lsGet(k){try{const v=localStorage.getItem(k);return v!==null?JSON.parse(v):null;}catch{return null;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}

function getGistConfig(){
  return { id: lsGet("asaas_gist_id")||"", token: lsGet("asaas_gist_token")||"" };
}

// Read entire data object from Gist
async function gistRead(){
  const {id,token} = getGistConfig();
  if(!id) return null;
  try{
    const headers = {"Accept":"application/vnd.github+json"};
    if(token) headers["Authorization"]=`Bearer ${token}`;
    const r = await fetch(`https://api.github.com/gists/${id}`,{headers});
    if(!r.ok) return null;
    const j = await r.json();
    const content = j.files?.["asaas-data.json"]?.content;
    return content ? JSON.parse(content) : null;
  }catch{return null;}
}

// Write entire data object to Gist
async function gistWrite(data){
  const {id,token} = getGistConfig();
  if(!id||!token) return false;
  try{
    const r = await fetch(`https://api.github.com/gists/${id}`,{
      method:"PATCH",
      headers:{"Accept":"application/vnd.github+json","Authorization":`Bearer ${token}`,"Content-Type":"application/json"},
      body:JSON.stringify({files:{"asaas-data.json":{content:JSON.stringify(data,null,2)}}})
    });
    return r.ok;
  }catch{return false;}
}

// In-memory cache of the full remote data object
let _remoteCache = null;

// storageGet: read from Gist (or localStorage fallback)
async function storageGet(k){
  if(k==="asaas_auth"||k==="asaas_gist_id"||k==="asaas_gist_token") return lsGet(k);
  const {id} = getGistConfig();
  if(!id) return lsGet(k); // no gist configured → local only
  if(!_remoteCache){
    _remoteCache = await gistRead();
    // Seed cache with localStorage values if gist is empty
    if(_remoteCache && !_remoteCache.asaas_q){
      const localQ = lsGet("asaas_q");
      if(localQ) _remoteCache.asaas_q = localQ;
    }
  }
  if(_remoteCache && k in _remoteCache) return _remoteCache[k];
  return lsGet(k);
}

// storageSet: write to localStorage immediately + update Gist async
async function storageSet(k, v){
  lsSet(k, v);
  if(k==="asaas_auth"||k==="asaas_gist_id"||k==="asaas_gist_token") return true;
  const {id} = getGistConfig();
  if(!id) return true; // no gist → local only, that's fine
  if(!_remoteCache) _remoteCache = (await gistRead()) || {};
  _remoteCache[k] = v;
  gistWrite(_remoteCache); // async, don't await — UI stays responsive
  return true;
}

// Force re-read from Gist (invalidate cache)
function invalidateCache(){ _remoteCache = null; }

// ── Gist Setup Modal ──────────────────────────────────────────────────
function GistSetupModal({onClose}){
  const [gistId,    setGistId]    = useState(lsGet("asaas_gist_id")||"");
  const [token,     setToken]     = useState(lsGet("asaas_gist_token")||"");
  const [testing,   setTesting]   = useState(false);
  const [testResult,setTestResult]= useState(null);

  const handleTest = async () => {
    setTesting(true); setTestResult(null);
    lsSet("asaas_gist_id", gistId.trim());
    lsSet("asaas_gist_token", token.trim());
    invalidateCache();
    const data = await gistRead();
    if(data!==null){
      setTestResult({ok:true, msg:"✅ اتصال ناجح! / Connection successful!"});
    } else {
      setTestResult({ok:false, msg:"❌ تعذّر الاتصال. تحقق من الـ ID والـ Token / Connection failed. Check ID & Token."});
    }
    setTesting(false);
  };

  const handleSave = () => {
    lsSet("asaas_gist_id", gistId.trim());
    lsSet("asaas_gist_token", token.trim());
    invalidateCache();
    onClose(true);
  };

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:999,padding:16}}>
      <div style={{background:"white",borderRadius:16,padding:28,maxWidth:540,width:"100%",boxShadow:"0 8px 40px rgba(0,0,0,.2)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
          <h3 style={{fontSize:17,fontWeight:800,color:"#1B3F6E"}}>
            إعداد المزامنة المشتركة
            <span className="en">Shared Sync Setup (GitHub Gist)</span>
          </h3>
          <button onClick={()=>onClose(false)} style={{background:"none",border:"none",cursor:"pointer",fontSize:20,color:"#6B7A8D",lineHeight:1}}>✕</button>
        </div>

        <div style={{background:"#EBF3FB",borderRadius:10,padding:"12px 14px",marginBottom:16,fontSize:12,color:"#1B3F6E",lineHeight:1.8}}>
          <strong>خطوات الإعداد (مرة واحدة فقط):</strong><br/>
          ١. اذهب إلى <a href="https://gist.github.com" target="_blank" style={{color:"#2E73B8"}}>gist.github.com</a> → أنشئ Gist جديد (Secret)<br/>
          &nbsp;&nbsp;&nbsp;الاسم: <code style={{background:"#D6EAF8",padding:"1px 5px",borderRadius:3}}>asaas-data.json</code> المحتوى: <code style={{background:"#D6EAF8",padding:"1px 5px",borderRadius:3}}>{"{}"}</code><br/>
          ٢. انسخ الـ <strong>Gist ID</strong> من الرابط (السلسلة الطويلة بعد اسم المستخدم)<br/>
          ٣. اذهب إلى <a href="https://github.com/settings/tokens" target="_blank" style={{color:"#2E73B8"}}>github.com/settings/tokens</a> → New token (classic) → فعّل <code>gist</code> فقط<br/>
          ٤. الصق القيمتين أدناه واضغط اختبار ثم حفظ
          <br/><br/>
          <span style={{direction:"ltr",display:"block",color:"#2E5F8E",fontSize:11}}>
            After setup: every browser that opens the survey will read &amp; write the same data automatically.
          </span>
        </div>

        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          <div>
            <label style={{fontSize:12,color:"#6B7A8D",display:"block",marginBottom:3}}>Gist ID</label>
            <input className="inp" dir="ltr" placeholder="e.g. a1b2c3d4e5f6..." value={gistId} onChange={e=>setGistId(e.target.value)} style={{fontFamily:"monospace",fontSize:13}}/>
          </div>
          <div>
            <label style={{fontSize:12,color:"#6B7A8D",display:"block",marginBottom:3}}>GitHub Token (gist scope)</label>
            <input className="inp" dir="ltr" type="password" placeholder="ghp_xxxxxxxxxxxx" value={token} onChange={e=>setToken(e.target.value)} style={{fontFamily:"monospace",fontSize:13}}/>
          </div>
        </div>

        {testResult && (
          <div style={{marginTop:10,padding:"8px 12px",borderRadius:8,background:testResult.ok?"#E8F8F2":"#FDECEA",color:testResult.ok?"#1A5E3F":"#8B1E1E",fontSize:13}}>
            {testResult.msg}
          </div>
        )}

        <div style={{display:"flex",gap:8,marginTop:16,justifyContent:"flex-end"}}>
          <button className="btn btn-ghost btn-sm" onClick={()=>handleTest()} disabled={!gistId.trim()||!token.trim()||testing}>
            {testing ? <><span className="spinner" style={{width:14,height:14}}/> جاري الاختبار...</> : "🔌 اختبار الاتصال / Test"}
          </button>
          <button className="btn btn-teal btn-sm" onClick={handleSave} disabled={!gistId.trim()}>
            💾 حفظ الإعدادات / Save
          </button>
        </div>
      </div>
    </div>
  );
}

  const [editing, setEditing] = useState(false);
  const [draft, setDraft]     = useState(value);
  const ref = useRef(null);
  useEffect(()=>{if(editing&&ref.current){ref.current.focus();ref.current.select();}},[editing]);

  const commit = () => {
    const v = draft.trim();
    if(v && v !== value) onSave(v);
    else setDraft(value);
    setEditing(false);
  };

  if(editing) return (
    <span style={{display:"inline-flex",alignItems:"center",gap:4,width:"100%"}} onClick={e=>e.stopPropagation()}>
      <input
        ref={ref}
        value={draft}
        onChange={e=>setDraft(e.target.value)}
        onKeyDown={e=>{if(e.key==="Enter")commit();if(e.key==="Escape"){setDraft(value);setEditing(false);}}}
        style={{flex:1,padding:isSmall?"2px 7px":"5px 10px",fontSize:isSmall?11:13,border:"1.5px solid #2E73B8",
          borderRadius:6,fontFamily:"'Tajawal',sans-serif",direction:dir,outline:"none",background:"white",minWidth:0}}
      />
      <button onClick={e=>{e.stopPropagation();commit();}}
        style={{background:"#2DADA0",border:"none",borderRadius:5,color:"white",cursor:"pointer",padding:"2px 8px",fontSize:12,flexShrink:0}}>✓</button>
      <button onClick={e=>{e.stopPropagation();setDraft(value);setEditing(false);}}
        style={{background:"#E1E8F0",border:"none",borderRadius:5,color:"#6B7A8D",cursor:"pointer",padding:"2px 7px",fontSize:12,flexShrink:0}}>✕</button>
    </span>
  );

  return (
    <span
      className={className}
      style={{...style, cursor:"text", display:"inline-flex", alignItems:"center", gap:4}}
      title="انقر للتعديل / Click to edit"
    >
      <span>{value || <em style={{opacity:.4}}>{placeholder}</em>}</span>
      <span
        onClick={e=>{e.stopPropagation();setEditing(true);}}
        style={{color:"#C8D0DA",fontSize:isSmall?10:12,lineHeight:1,cursor:"pointer",flexShrink:0,transition:"color .15s",userSelect:"none"}}
        onMouseEnter={e=>e.currentTarget.style.color="#2E73B8"}
        onMouseLeave={e=>e.currentTarget.style.color="#C8D0DA"}
      >✎</span>
    </span>
  );
}

// ── Editable Option (inline dept/option rename, AR + EN) ─────────────
function EditableOpt({arVal, enVal, isAdmin, onChangeAr, onChangeEn, children}) {
  if(!isAdmin) return children;
  return (
    <span style={{display:"flex",flexDirection:"column",flex:1,gap:1,minWidth:0}}>
      <InlineEdit value={arVal} onSave={onChangeAr} dir="rtl" />
      {enVal !== undefined && (
        <InlineEdit value={enVal||""} onSave={onChangeEn} dir="ltr"
          style={{fontSize:11,color:"#8A97A8"}} isSmall={true} placeholder="English translation..." />
      )}
    </span>
  );
}

// ── Bar Chart ─────────────────────────────────────────────────────────
function BarChart({data, total, color}) {
  const max = Math.max(...data.map(d => d.count), 1);
  return (
    <div>
      {data.map(({label, count}, i) => (
        <div key={i} className="bar-row">
          <div className="bar-lbl">
            {ar(label)}
            {en(label) && <span className="en">{en(label)}</span>}
          </div>
          <div className="bar-track">
            <div className="bar-fill" style={{width:`${Math.round((count/max)*100)}%`,background:color}}>
              {count > 0 && <span style={{fontSize:10,color:"white",fontWeight:700}}>{count}</span>}
            </div>
          </div>
          <div className="bar-pct">{total > 0 ? Math.round((count/total)*100) : 0}%</div>
        </div>
      ))}
    </div>
  );
}

// ── Question Input ────────────────────────────────────────────────────
function QInput({q, value, onChange, isAdmin=false, onRenameOption, onRenameOptionEn, onEditQuestionText}) {
  if (q.type === "rating5") {
    return (
      <div className="rating-row">
        {(q.labels||[]).map((lbl, i) => (
          <button key={i} className={`r-btn${value===i+1?" sel":""}`} onClick={() => onChange(i+1)}>
            <span className="r-num">{i+1}</span>
            <span className="r-ar">{ar(lbl)}</span>
            {en(lbl) && <span className="r-en">{en(lbl)}</span>}
          </button>
        ))}
      </div>
    );
  }
  if (q.type==="radio"||q.type==="yesno") {
    return (
      <div className="radio-grp">
        {(q.options||[]).map((opt, i) => (
          <div key={i} className={`radio-opt${value===opt?" sel":""}`}
            style={{alignItems:"flex-start",gap:8}}
            onClick={() => !isAdmin && onChange(opt)}>
            <div className={`rdot${value===opt?" sel":""}`} style={{marginTop:3,flexShrink:0}}>
              {value===opt&&<div className="rdot-inner"/>}
            </div>
            {isAdmin ? (
              <span style={{flex:1,display:"flex",alignItems:"flex-start",gap:4,minWidth:0}}>
                <EditableOpt
                  arVal={ar(opt)} enVal={en(opt)}
                  isAdmin={true}
                  onChangeAr={v => onRenameOption && onRenameOption(i, v)}
                  onChangeEn={v => onRenameOptionEn && onRenameOptionEn(i, v)}
                ><span/></EditableOpt>
                <button className="opt-del" title="حذف الخيار / Delete option"
                  onClick={e=>{e.stopPropagation(); onRenameOption && onRenameOption("DEL",i);}}>✕</button>
              </span>
            ) : (
              <span className="r-opt-text" onClick={()=>onChange(opt)}>
                {ar(opt)}
                {en(opt) && <span className="en">{en(opt)}</span>}
              </span>
            )}
          </div>
        ))}
        {isAdmin && (
          <button className="btn btn-ghost btn-xs"
            style={{marginTop:6,alignSelf:"flex-start"}}
            onClick={e=>{e.stopPropagation(); onRenameOption && onRenameOption("ADD","");}}>
            + إضافة خيار / Add option
          </button>
        )}
      </div>
    );
  }
  if (q.type==="open") {
    return <textarea className="txt-area" placeholder="اكتب إجابتك هنا... / Write your answer here..." value={value||""} onChange={e=>onChange(e.target.value)}/>;
  }
  return null;
}


// ── Add Question Button + Mini Form ──────────────────────────────────
function AddQuestionButton({section, onAdd}) {
  const [open, setOpen] = useState(false);
  const [form, setForm] = useState({
    textAr:"سؤال جديد", textEn:"New Question",
    type:"radio", required:false,
    optsAr:"خيار ١، خيار ٢، خيار ٣",
    optsEn:"Option 1, Option 2, Option 3",
    labelsAr:"لا أوافق بشدة، لا أوافق، محايد، أوافق، أوافق بشدة",
    labelsEn:"Strongly Disagree, Disagree, Neutral, Agree, Strongly Agree"
  });

  const TYPES=[
    ["radio","اختيار متعدد / Multiple choice"],
    ["yesno","نعم/لا — Yes/No"],
    ["rating5","تقييم خماسي / 5-point rating"],
    ["open","مفتوح / Open-ended"]
  ];

  const handleSave = () => {
    const arOpts = form.optsAr.split("،").map(s=>s.trim()).filter(Boolean);
    const enOpts = form.optsEn.split(",").map(s=>s.trim()).filter(Boolean);
    const arLbls = form.labelsAr.split("،").map(s=>s.trim()).filter(Boolean);
    const enLbls = form.labelsEn.split(",").map(s=>s.trim()).filter(Boolean);

    const options = form.type==="yesno"
      ? ["نعم|Yes","لا|No","لا أعرف|Not Sure"]
      : form.type==="radio"
        ? arOpts.map((a,i)=>`${a}|${enOpts[i]||a}`)
        : [];
    const labels = form.type==="rating5"
      ? arLbls.map((a,i)=>`${a}|${enLbls[i]||a}`)
      : [];

    onAdd({
      id: "q_"+Date.now(),
      section,
      text: `${form.textAr}|${form.textEn}`,
      type: form.type,
      required: form.required,
      options,
      labels
    });
    setOpen(false);
    setForm({textAr:"سؤال جديد",textEn:"New Question",type:"radio",required:false,
      optsAr:"خيار ١، خيار ٢، خيار ٣",optsEn:"Option 1, Option 2, Option 3",
      labelsAr:"لا أوافق بشدة، لا أوافق، محايد، أوافق، أوافق بشدة",

    <div style={{marginBottom:8}}>

        </button>
      )}
      {open && (
        <div className="add-q-panel">
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <span style={{fontSize:14,fontWeight:700,color:"#1B3F6E"}}>
              إضافة سؤال جديد <span style={{fontSize:11,fontWeight:400,color:"#6B7A8D"}}>/ Add new question</span>
            </span>
            <button onClick={()=>setOpen(false)} style={{background:"none",border:"none",cursor:"pointer",color:"#6B7A8D",fontSize:18,lineHeight:1}}>✕</button>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              <div>
                <div style={{fontSize:11,color:"#6B7A8D",marginBottom:3}}>نص السؤال (عربي)</div>
                <input className="inp" dir="rtl" value={form.textAr} onChange={e=>setForm(f=>({...f,textAr:e.target.value}))} placeholder="نص السؤال..."/>
              </div>
              <div>
                <div style={{fontSize:11,color:"#6B7A8D",marginBottom:3}}>Question text (English)</div>
                <input className="inp" dir="ltr" value={form.textEn} onChange={e=>setForm(f=>({...f,textEn:e.target.value}))} placeholder="Question text..."/>
              </div>
            </div>
            <div style={{display:"flex",gap:10,alignItems:"flex-end"}}>
              <div style={{flex:1}}>
                <div style={{fontSize:11,color:"#6B7A8D",marginBottom:3}}>نوع السؤال / Type</div>
                <select className="sel-field" value={form.type} onChange={e=>setForm(f=>({...f,type:e.target.value}))}>
                  {TYPES.map(([v,l])=><option key={v} value={v}>{l}</option>)}
                </select>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:6,paddingBottom:4}}>
                <label className="toggle" style={{width:38,height:22}}>
                  <input type="checkbox" checked={form.required} onChange={e=>setForm(f=>({...f,required:e.target.checked}))}/>
                  <span className="tog-sl"/>
                </label>
                <span style={{fontSize:12,color:"#1A2332"}}>مطلوب/Required</span>
              </div>
            </div>
            {form.type==="radio" && (
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                <div>

                  <textarea className="txt-area" dir="rtl" style={{minHeight:64}} value={form.optsAr} onChange={e=>setForm(f=>({...f,optsAr:e.target.value}))}/>

              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>

                  <div style={{fontSize:11,color:"#6B7A8D",marginBottom:3}}>التسميات (عربي، مفصولة بـ ،)</div>

                  <textarea className="txt-area" dir="ltr" style={{minHeight:64}} value={form.labelsEn} onChange={e=>setForm(f=>({...f,labelsEn:e.target.value}))}/>
                </div>
              </div>
            )}
            <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:4}}>
              <button className="btn btn-ghost btn-sm" onClick={()=>setOpen(false)}>إلغاء / Cancel</button>
              <button className="btn btn-teal btn-sm" onClick={handleSave}>حفظ وإضافة / Save & Add</button>
            </div>
          </div>
        </div>
      )}

  );
}

// ── Survey Page ───────────────────────────────────────────────────────
function SurveyPage({questions, surveyActive, onSubmit, isAdmin=false, onRenameOption, onEditQuestion, onEditSection, onMoveQuestion, onDeleteQuestion, onAddQuestion}) {
  const [answers, setAnswers] = useState({});
  const [submitted, setSubmitted] = useState(false);
  const [errors, setErrors] = useState({});
  const [submitting, setSubmitting] = useState(false);
  const sections = [...new Set(questions.map(q => q.section))];
  const totalReq = questions.filter(q=>q.required).length;
  const doneReq = questions.filter(q=>q.required&&answers[q.id]!==undefined&&answers[q.id]!=="").length;
  const prog = totalReq>0 ? Math.round((doneReq/totalReq)*100) : 0;

  if (!surveyActive) return (
    <div className="page"><div className="ok-screen">
      <div className="ok-icon">🔒</div>
      <h2 style={{fontSize:20,fontWeight:800,color:"#1B3F6E",marginBottom:6}}>
        الاستبيان غير متاح حالياً
        <span className="en">Survey is currently unavailable</span>
      </h2>
      <p style={{color:"#6B7A8D",fontSize:13}}>تم إيقاف الاستبيان مؤقتاً من قِبَل الإدارة.</p>
      <p style={{color:"#8A97A8",fontSize:12,marginTop:4}}>The survey has been temporarily paused by management.</p>
    </div></div>
  );

  if (submitted) return (
    <div className="page"><div className="ok-screen">
      <div className="ok-icon">✅</div>
      <h2 style={{fontSize:22,fontWeight:800,color:"#1B3F6E",marginBottom:6}}>
        شكراً على مشاركتك!
        <span className="en">Thank you for your participation!</span>
      </h2>
      <p style={{color:"#6B7A8D",fontSize:13,maxWidth:400,margin:"0 auto 8px",lineHeight:1.7}}>تم استلام إجاباتك بنجاح. ستُعالَج بسرية تامة.</p>
      <p style={{color:"#8A97A8",fontSize:12,maxWidth:400,margin:"0 auto 22px",lineHeight:1.7}}>Your responses have been received. They will be treated with complete confidentiality.</p>
      <button className="btn btn-teal" onClick={() => {setAnswers({});setSubmitted(false);}}>
        ملء استبيان جديد <span style={{fontSize:11,opacity:.85}}>/ Fill a new survey</span>
      </button>
    </div></div>
  );

  const setAnswer = (id,val) => {
    setAnswers(a=>({...a,[id]:val}));
    setErrors(e=>{const n={...e};delete n[id];return n;});
  };

  const handleSubmit = () => {
    const errs = {};
    questions.filter(q=>q.required).forEach(q=>{if(!answers[q.id]||answers[q.id]==="")errs[q.id]=true;});
    if(Object.keys(errs).length>0){setErrors(errs);return;}
    setSubmitting(true);
    onSubmit(answers);
    setSubmitting(false);
    setSubmitted(true);
  };

  return (
    <div className="page">
      <div className="hero">
        <h1>استبيان رضا الموظفين وتطلعاتهم</h1>
        <div className="hero-en">Employee Satisfaction & Aspirations Survey</div>
        <p>آراؤكم هي البوصلة التي نسترشد بها لبناء بيئة عمل أفضل. جميع الإجابات سرية تماماً.</p>
        <p className="hero-p-en">Your opinions are our compass for building a better workplace. All responses are completely confidential.</p>
        <div className="hero-prog">
          <span>التقدم / Progress: {prog}%</span>
          <div style={{width:140,height:5,background:"rgba(255,255,255,.3)",borderRadius:3,overflow:"hidden"}}>
            <div style={{width:`${prog}%`,height:"100%",background:"#2DADA0",borderRadius:3,transition:"width .3s"}}></div>
          </div>
        </div>
      </div>
      <div className="alert alert-info">
        🔒 جميع إجاباتكم ستُعامَل بسرية تامة — المدة المتوقعة: 10-15 دقيقة
        <span className="en">All responses will be treated with complete confidentiality — Estimated time: 10–15 minutes</span>
      </div>
      {isAdmin && (
        <div className="alert" style={{background:"#FFF8E6",border:"1px solid #FAC775",color:"#7D4A00",marginBottom:14,lineHeight:1.7}}>
          ⚙️ <strong>وضع الإدارة / Admin Mode</strong>
          <span className="en" style={{marginTop:4,display:"block"}}>
            ✎ Click any text to edit it inline (AR &amp; EN) &nbsp;|&nbsp;
            ⠿ Drag questions to reorder &nbsp;|&nbsp;
            ▲▼ Use arrows to move up/down &nbsp;|&nbsp;
            🗑 Delete a question &nbsp;|&nbsp;
            ＋ Add new question below each section &nbsp;|&nbsp;
            ✕ Remove an option
          </span>
          <span style={{fontSize:11,display:"block",marginTop:3}}>
            انقر على أي نص لتعديله • اسحب السؤال لإعادة ترتيبه • ▲▼ للتحريك • 🗑 حذف السؤال • ＋ إضافة سؤال • ✕ حذف خيار
          </span>
        </div>
      )}
      {sections.map(sec => (
        <div key={sec}>
          <div className="sec-div">
            <div className="sec-div-line"/>
            <div className="sec-div-text">
              📌 {isAdmin ? (
                <span style={{display:"flex",flexDirection:"column",gap:2,alignItems:"center"}}>
                  <InlineEdit value={ar(sec)} onSave={v=>onEditSection(sec,v,'ar')} dir="rtl" style={{fontWeight:700,fontSize:14,color:"#1B3F6E",textAlign:"center"}}/>
                  <InlineEdit value={en(sec)||""} onSave={v=>onEditSection(sec,v,'en')} dir="ltr" style={{fontSize:10,color:"#6B7A8D",textAlign:"center"}} isSmall={true} placeholder="English section name..."/>
                </span>
              ) : (
                <span>{ar(sec)}{en(sec) && <span className="en">{en(sec)}</span>}</span>
              )}
            </div>
            <div className="sec-div-line"/>
          </div>
          {questions.map((q,globalIdx) => q.section!==sec ? null : (
            <div key={q.id} className="q-item-wrap" draggable={isAdmin}
              onDragStart={e=>{if(isAdmin){e.dataTransfer.setData("qid",q.id);e.currentTarget.classList.add("dragging");}}}
              onDragEnd={e=>e.currentTarget.classList.remove("dragging")}
              onDragOver={e=>{if(isAdmin){e.preventDefault();e.currentTarget.classList.add("drag-over");}}}
              onDragLeave={e=>e.currentTarget.classList.remove("drag-over")}
              onDrop={e=>{
                e.currentTarget.classList.remove("drag-over");
                if(!isAdmin)return;
                const fromId=e.dataTransfer.getData("qid");
                if(fromId===q.id)return;
                onMoveQuestion(fromId,q.id);
              }}
            >
              {isAdmin && (
                <div className="q-admin-bar">
                  <span className="drag-handle" title="اسحب لإعادة الترتيب / Drag to reorder">⠿</span>
                  <button className="q-move-btn" title="تحريك لأعلى / Move up" onClick={()=>onMoveQuestion(q.id,'UP')}>▲</button>
                  <button className="q-move-btn" title="تحريك لأسفل / Move down" onClick={()=>onMoveQuestion(q.id,'DOWN')}>▼</button>
                  <button className="q-del-btn" title="حذف السؤال / Delete question" onClick={()=>onDeleteQuestion(q.id)}>🗑</button>
                </div>
              )}
              <div className="q-item" style={{...(errors[q.id]?{border:"1.5px solid #E74C3C"}:{}),flex:1,minWidth:0}}>
                <div className="q-text">
                  {q.required && <span className="req-star">*</span>}
                  {isAdmin ? (
                    <span style={{display:"flex",flexDirection:"column",gap:3}}>
                      <InlineEdit value={ar(q.text)} onSave={v=>onEditQuestion(q.id,v,'ar')} dir="rtl"
                        style={{fontWeight:600,fontSize:14,color:"#1A2332"}} />
                      <InlineEdit value={en(q.text)||""} onSave={v=>onEditQuestion(q.id,v,'en')} dir="ltr"
                        style={{fontSize:11,color:"#6B7A8D",fontWeight:400}} isSmall={true} placeholder="English question text..." />
                    </span>
                  ) : (
                    <span>
                      {ar(q.text)}
                      {en(q.text) && <span className="en">{en(q.text)}</span>}
                    </span>
                  )}
                </div>
                <QInput q={q} value={answers[q.id]} onChange={v=>setAnswer(q.id,v)}
                  isAdmin={isAdmin}
                  onRenameOption={(idx,name)=>onRenameOption(q.id,idx,name,'ar')}
                  onRenameOptionEn={(idx,name)=>onRenameOption(q.id,idx,name,'en')}
                  onEditQuestionText={(ar,en)=>onEditQuestion(q.id,ar,en)}
                />
                {errors[q.id] && (
                  <p style={{color:"#E74C3C",fontSize:11,marginTop:5}}>
                    هذا السؤال مطلوب / <em>This field is required</em>
                  </p>
                )}
              </div>
            </div>
          ))}
          {isAdmin && <AddQuestionButton section={sec} onAdd={onAddQuestion}/>}
        </div>
      ))}
      {!isAdmin && (
        <div style={{textAlign:"center",paddingTop:14}}>
          <button className="btn btn-primary" style={{padding:"13px 44px",fontSize:15}} onClick={handleSubmit} disabled={submitting}>
            {submitting ? <span className="spinner"/> : <>إرسال الاستبيان ✉️ <span style={{fontSize:12,opacity:.85}}>/ Submit Survey</span></>}
          </button>
        </div>
      )}
      {isAdmin && (
        <div style={{textAlign:"center",paddingTop:14,paddingBottom:8}}>
          <button className="btn btn-primary" style={{padding:"13px 44px",fontSize:15}} onClick={handleSubmit} disabled={submitting}>
            {submitting ? <span className="spinner"/> : <>إرسال الاستبيان ✉️ <span style={{fontSize:12,opacity:.85}}>/ Submit Survey</span></>}
          </button>
        </div>
      )}
    </div>
  );
}

// ── Admin Page ────────────────────────────────────────────────────────
function AdminPage({questions, responses, surveyActive, onToggleActive, onSaveQuestions, onClearResponses}) {
  const [tab, setTab] = useState("questions");
  const [showNew, setShowNew] = useState(false);
  const [confirmClear, setConfirmClear] = useState(false);
  const [nq, setNq] = useState({text:"",type:"rating5",section:"الرضا العام|Overall Satisfaction",required:true,opts:"خيار ١|Option 1، خيار ٢|Option 2، خيار ٣|Option 3"});
  const sections = [...new Set(questions.map(q=>q.section))];

  const delQ = id => onSaveQuestions(questions.filter(q=>q.id!==id));
  const togReq = id => onSaveQuestions(questions.map(q=>q.id===id?{...q,required:!q.required}:q));
  const moveUp = i => {if(i===0)return;const qs=[...questions];[qs[i-1],qs[i]]=[qs[i],qs[i-1]];onSaveQuestions(qs);};
  const moveDown = i => {if(i>=questions.length-1)return;const qs=[...questions];[qs[i],qs[i+1]]=[qs[i+1],qs[i]];onSaveQuestions(qs);};
  const addQ = () => {
    if(!nq.text.trim())return;
    const q={id:"q_"+Date.now(),text:nq.text,type:nq.type,section:nq.section,required:nq.required,
      options:nq.type!=="open"&&nq.type!=="rating5"?nq.opts.split("،").map(s=>s.trim()).filter(Boolean):[],
      labels:nq.type==="rating5"?["١|1","٢|2","٣|3","٤|4","٥|5"]:[]};
    onSaveQuestions([...questions,q]);
    setShowNew(false);
    setNq({text:"",type:"rating5",section:"الرضا العام|Overall Satisfaction",required:true,opts:"خيار ١|Option 1، خيار ٢|Option 2، خيار ٣|Option 3"});
  };

  return (
    <div className="page">
      <div className="fl aic jb mb4">
        <div>
          <h2 className="sec-hdr">لوحة التحكم <span className="en">Admin Dashboard</span></h2>
          <p className="sec-sub">إدارة الاستبيان والأسئلة والإجابات <span className="en">Manage survey, questions and responses</span></p>
        </div>
        <div className="fl aic g3">
          <span className="ts tmuted">حالة الاستبيان / Status:</span>
          <label className="toggle"><input type="checkbox" checked={surveyActive} onChange={e=>onToggleActive(e.target.checked)}/><span className="tog-sl"/></label>
          <span className={`badge ${surveyActive?"badge-teal":"badge-red"}`}>{surveyActive?"مفعّل / Active":"موقوف / Paused"}</span>
        </div>
      </div>
      <div className="metric-grid">
        <div className="metric"><div className="metric-lbl">إجمالي الإجابات<span className="en">Total Responses</span></div><div className="metric-val">{responses.length}</div></div>
        <div className="metric"><div className="metric-lbl">عدد الأسئلة<span className="en">Questions</span></div><div className="metric-val">{questions.length}</div></div>
        <div className="metric"><div className="metric-lbl">الأقسام<span className="en">Sections</span></div><div className="metric-val">{sections.length}</div></div>
        <div className="metric"><div className="metric-lbl">آخر إجابة<span className="en">Last Response</span></div><div className="metric-val" style={{fontSize:13}}>{responses.length>0?new Date(responses[responses.length-1].submittedAt).toLocaleDateString("en-GB"):"—"}</div></div>
      </div>
      <div className="tabs">
        {[["questions","الأسئلة","Questions"],["responses","الإجابات","Responses"]].map(([id,a,e])=>(
          <div key={id} className={`tab${tab===id?" active":""}`} onClick={()=>setTab(id)}>{a}<span className="en">{e}</span></div>
        ))}
      </div>

      {tab==="questions" && (
        <div>
          <div className="fl jb mb3">
            <span className="ts tmuted">{questions.length} سؤال / questions</span>
            <button className="btn btn-teal btn-sm" onClick={()=>setShowNew(v=>!v)}>+ إضافة سؤال / Add Question</button>
          </div>
          {showNew && (
            <div className="card" style={{border:"2px solid #2DADA0",marginBottom:18}}>
              <h3 style={{fontSize:14,fontWeight:700,color:"#1B3F6E",marginBottom:14}}>
                إضافة سؤال جديد <span style={{fontSize:11,fontWeight:400,color:"#6B7A8D"}}>/ Add new question</span>
              </h3>
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                <div>
                  <label className="ts tmuted">نص السؤال / Question text</label>
                  <input className="inp" style={{marginTop:4}} value={nq.text} onChange={e=>setNq(n=>({...n,text:e.target.value}))} placeholder="اكتب السؤال... / Write the question..."/>
                </div>
                <div className="grid2">
                  <div>
                    <label className="ts tmuted">النوع / Type</label>
                    <select className="sel-field" style={{marginTop:4}} value={nq.type} onChange={e=>setNq(n=>({...n,type:e.target.value}))}>
                      <option value="rating5">تقييم خماسي / 5-point rating</option>
                      <option value="radio">اختيار متعدد / Multiple choice</option>
                      <option value="yesno">نعم / لا — Yes / No</option>
                      <option value="open">مفتوح / Open-ended</option>
                    </select>
                  </div>
                  <div>
                    <label className="ts tmuted">القسم / Section</label>
                    <input className="inp" style={{marginTop:4}} value={nq.section} onChange={e=>setNq(n=>({...n,section:e.target.value}))} placeholder="اسم القسم / Section name"/>
                  </div>
                </div>
                {nq.type==="radio" && (
                  <div>
                    <label className="ts tmuted">الخيارات (مفصولة بـ ،) / Options (separated by ،)</label>
                    <input className="inp" style={{marginTop:4}} value={nq.opts} onChange={e=>setNq(n=>({...n,opts:e.target.value}))}/>
                  </div>
                )}
                <div className="fl aic g3">
                  <label className="toggle"><input type="checkbox" checked={nq.required} onChange={e=>setNq(n=>({...n,required:e.target.checked}))}/><span className="tog-sl"/></label>
                  <span className="ts">مطلوب / Required</span>
                </div>
                <div className="fl g2 mt2">
                  <button className="btn btn-teal btn-sm" onClick={addQ}>حفظ / Save</button>
                  <button className="btn btn-ghost btn-sm" onClick={()=>setShowNew(false)}>إلغاء / Cancel</button>
                </div>
              </div>
            </div>
          )}
          {sections.map(sec => (
            <div key={sec}>
              <div style={{fontSize:13,fontWeight:700,color:"#1B3F6E",margin:"18px 0 8px",display:"flex",alignItems:"center",gap:8}}>
                <span style={{background:"#EBF3FB",padding:"3px 10px",borderRadius:6}}>
                  {ar(sec)} <span style={{fontWeight:400,fontSize:11,color:"#6B7A8D"}}>/ {en(sec)}</span>
                </span>
              </div>
              {questions.map((q,idx)=>q.section!==sec?null:(
                <div key={q.id} className="card-sm fl aic g3 mb2">
                  <div style={{display:"flex",flexDirection:"column",gap:1}}>
                    <button onClick={()=>moveUp(idx)} style={{background:"none",border:"none",cursor:"pointer",color:"#C5D0DC",fontSize:11,lineHeight:1,fontFamily:"monospace"}}>▲</button>
                    <button onClick={()=>moveDown(idx)} style={{background:"none",border:"none",cursor:"pointer",color:"#C5D0DC",fontSize:11,lineHeight:1,fontFamily:"monospace"}}>▼</button>
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:500,lineHeight:1.5}}>
                      {ar(q.text)}
                      {en(q.text) && <span style={{fontSize:11,color:"#6B7A8D",display:"block",direction:"ltr",textAlign:"right"}}>{en(q.text)}</span>}
                    </div>
                    <div className="fl g2 mt2" style={{flexWrap:"wrap"}}>
                      <span className="chip" style={{background:"#EBF3FB",color:"#1B3F6E"}}>{q.type==="rating5"?"تقييم/Rating":q.type==="radio"?"اختيار/Choice":q.type==="yesno"?"نعم-لا/Yes-No":"مفتوح/Open"}</span>
                      {q.required&&<span className="chip" style={{background:"#FDECEA",color:"#8B1E1E"}}>مطلوب/Required</span>}
                    </div>
                  </div>
                  <div className="fl g2">
                    <button className="btn btn-ghost btn-xs" onClick={()=>togReq(q.id)}>{q.required?"اختياري/Optional":"مطلوب/Required"}</button>
                    <button className="btn btn-danger btn-xs" onClick={()=>delQ(q.id)}>حذف/Del</button>
                  </div>
                </div>
              ))}
            </div>
          ))}
        </div>
      )}

      {tab==="responses" && (
        <div>
          <div className="fl jb aic mb3">
            <span className="ts tmuted">{responses.length} إجابة مستلمة / responses received</span>
            {responses.length>0&&<button className="btn btn-danger btn-sm" onClick={()=>setConfirmClear(true)}>مسح الكل / Clear All</button>}
          </div>
          {confirmClear && (
            <div className="alert alert-warn mb3">
              هل أنت متأكد؟ لا يمكن التراجع. <span className="en">Are you sure? This cannot be undone.</span>

                <button className="btn btn-danger btn-xs" onClick={()=>{onClearResponses();setConfirmClear(false);}}>نعم / Yes</button>
                <button className="btn btn-ghost btn-xs" onClick={()=>setConfirmClear(false)}>إلغاء / Cancel</button>
              </div>
            </div>
          )}
          {responses.length===0 ? (
            <div style={{textAlign:"center",padding:"44px 0",color:"#6B7A8D"}}>
              <div>لا توجد إجابات حتى الآن</div>

            </div>
          ) : (
            <div className="tbl-wrap">
              <table className="dtbl">
                <thead><tr>
                  <th>#</th>
                  <th>التاريخ<span className="en">Date</span></th>
                  <th>القسم<span className="en">Dept</span></th>
                  <th>الخبرة<span className="en">Experience</span></th>
                  <th>الرضا<span className="en">Satisfaction</span></th>
                  <th>التوصية<span className="en">Recommend</span></th>
                </tr></thead>
                <tbody>
                  {responses.map((r,i)=>(
                    <tr key={r.id}>
                      <td>{i+1}</td>
                      <td>{new Date(r.submittedAt).toLocaleDateString("en-GB")}</td>
                      <td>{r.q_dept?ar(r.q_dept):"—"}</td>
                      <td>{r.q_exp?ar(r.q_exp):"—"}</td>
                      <td>{r.q34?`${r.q34}/5`:"—"}</td>
                      <td>{r.q35?ar(r.q35):"—"}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ── Analytics Page ────────────────────────────────────────────────────
function AnalyticsPage({questions, responses, analysisCache, setAnalysisCache}) {
  const [tab, setTab] = useState("overview");
  const [aiLoading, setAiLoading] = useState(false);
  const [openAI, setOpenAI] = useState(null);

  if (!responses.length) return (
    <div className="page"><div className="ok-screen">
      <div className="ok-icon">📊</div>
      <h2 style={{fontSize:19,fontWeight:800,color:"#1B3F6E",marginBottom:6}}>لا توجد بيانات للتحليل<span className="en">No data to analyse yet</span></h2>
      <p style={{color:"#6B7A8D",fontSize:13}}>انتظر حتى يملأ الموظفون الاستبيان.</p>
      <p style={{color:"#8A97A8",fontSize:12,marginTop:4}}>Wait for employees to fill out the survey.</p>
    </div></div>
  );

  const ratingQs = questions.filter(q=>q.type==="rating5");
  const choiceQs = questions.filter(q=>q.type==="radio"||q.type==="yesno");
  const openQs = questions.filter(q=>q.type==="open");
  const avg = qId => {const v=responses.map(r=>r[qId]).filter(v=>v!=null);return v.length?v.reduce((a,b)=>a+b,0)/v.length:0;};
  const overallSat = avg("q34");
  const overallScore = Math.round(overallSat*20);
  const scoreColor = overallScore>=70?"#2DADA0":overallScore>=50?"#F39C12":"#E74C3C";
  const npsR = responses.map(r=>r.q35).filter(Boolean);
  const promo = npsR.filter(v=>v.includes("٩-١٠")||v.includes("9-10")||v.includes("9–10")).length;
  const detrac = npsR.filter(v=>v.includes("١-٢")||v.includes("٣-٤")).length;
  const nps = npsR.length>0?Math.round(((promo-detrac)/npsR.length)*100):0;
  const secScores = [...new Set(ratingQs.map(q=>q.section))].map(sec=>{
    const sqs=ratingQs.filter(q=>q.section===sec);
    return {sec,a:sqs.reduce((s,q)=>s+avg(q.id),0)/sqs.length};
  });

  const analyzeQ = async (qId,qText,answers) => {
    if(analysisCache[qId]){setOpenAI({qId,qText,result:analysisCache[qId]});return;}
    setAiLoading(true);setOpenAI({qId,qText,result:null});
    const sample=answers.slice(0,20).filter(Boolean);
    if(!sample.length){setOpenAI({qId,qText,result:"لا توجد إجابات / No answers yet."});setAiLoading(false);return;}
    try{
      const prompt=`You are an expert HR analyst. Analyse the following employee survey responses in BOTH Arabic and English (Arabic first, then English translation below each point).\n\nQuestion (AR): ${ar(qText)}\nQuestion (EN): ${en(qText)||ar(qText)}\n\nAnswers:\n${sample.map((a,i)=>`${i+1}. ${a}`).join("\n")}\n\nProvide analysis with these sections, each in Arabic followed by English:\n**الموضوعات الرئيسية / Key Themes:**\n**المخاوف المتكررة / Recurring Concerns:**\n**المقترحات / Suggestions:**\n**ملخص / Summary:** (2 sentences)`;
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1200,messages:[{role:"user",content:prompt}]})});
      const data=await res.json();
      const text=data.content?.find(b=>b.type==="text")?.text||"تعذر التحليل. / Analysis failed.";
      setAnalysisCache(c=>({...c,[qId]:text}));setOpenAI({qId,qText,result:text});
    }catch{setOpenAI({qId,qText,result:"حدث خطأ. / An error occurred."});}
    setAiLoading(false);
  };

  return (
    <div className="page">
      <h2 className="sec-hdr">التحليلات والنتائج<span className="en">Analytics & Results</span></h2>
      <p className="sec-sub">بناءً على {responses.length} إجابة مستلمة<span className="en">Based on {responses.length} received responses</span></p>
      <div className="tabs">
        {[["overview","نظرة عامة","Overview"],["questions","تحليل الأسئلة","Questions"],["open","الأسئلة المفتوحة","Open-Ended"]].map(([id,a,e])=>(
          <div key={id} className={`tab${tab===id?" active":""}`} onClick={()=>setTab(id)}>{a}<span className="en">{e}</span></div>
        ))}
      </div>

      {tab==="overview" && (
        <div>
          <div className="metric-grid">
            <div className="metric"><div className="metric-lbl">إجمالي المشاركين<span className="en">Total Participants</span></div><div className="metric-val">{responses.length}</div></div>
            <div className="metric"><div className="metric-lbl">الرضا العام<span className="en">Overall Satisfaction</span></div><div className="metric-val" style={{color:scoreColor}}>{overallScore}%</div><div className="metric-sub">{overallSat.toFixed(1)} / 5</div></div>
            <div className="metric"><div className="metric-lbl">مؤشر NPS<span className="en">NPS Index</span></div><div className="metric-val" style={{color:nps>=30?"#2DADA0":nps>=0?"#F39C12":"#E74C3C"}}>{nps}</div></div>
            <div className="metric"><div className="metric-lbl">أعلى محور رضا<span className="en">Top Satisfaction Area</span></div><div className="metric-val" style={{fontSize:12}}>{secScores.length>0?ar(secScores.reduce((a,b)=>a.a>b.a?a:b).sec).substring(0,14)+"...":"—"}</div></div>
          </div>
          <div className="card">
            <h3 style={{fontSize:14,fontWeight:700,color:"#1B3F6E",marginBottom:14}}>
              الرضا حسب المحور <span style={{fontSize:11,fontWeight:400,color:"#6B7A8D"}}>/ Satisfaction by Section</span>
            </h3>
            {secScores.map(({sec,a})=>{
              const pct=Math.round(a*20);
              const col=pct>=70?"#2DADA0":pct>=50?"#F39C12":"#E74C3C";
              return (
                <div key={sec} className="mb3">
                  <div className="fl jb mb2">
                    <span style={{fontSize:12}}>{ar(sec)} <span style={{fontSize:10,color:"#6B7A8D"}}>/ {en(sec)}</span></span>
                    <span style={{fontSize:13,fontWeight:700,color:col}}>{pct}%</span>
                  </div>
                  <div className="prog-bg"><div className="prog-fill" style={{width:`${pct}%`,background:col}}/></div>
                </div>
              );
            })}
          </div>
          <div className="grid2">
            <div className="card">
              <h3 style={{fontSize:13,fontWeight:700,color:"#1B3F6E",marginBottom:12}}>توزيع الأقسام <span style={{fontSize:10,fontWeight:400,color:"#6B7A8D"}}>/  Departments</span></h3>
              <BarChart data={["العمليات|Operations","التقنية|Technology","المالية|Finance","الموارد البشرية|Human Resources","أخرى|Other"].map(opt=>({label:opt,count:responses.filter(r=>r.q_dept===opt).length})).filter(d=>d.count>0)} total={responses.length} color="#2E73B8"/>
            </div>
            <div className="card">
              <h3 style={{fontSize:13,fontWeight:700,color:"#1B3F6E",marginBottom:12}}>سنوات الخبرة <span style={{fontSize:10,fontWeight:400,color:"#6B7A8D"}}>/  Experience</span></h3>
              <BarChart data={["أقل من سنة|<1 yr","١-٣ سنوات|1–3 yrs","٤-٦ سنوات|4–6 yrs","٧-١٠ سنوات|7–10 yrs","أكثر من ١٠ سنوات|10+ yrs"].map(opt=>({label:opt,count:responses.filter(r=>r.q_exp===opt).length})).filter(d=>d.count>0)} total={responses.length} color="#2DADA0"/>
            </div>
          </div>
        </div>
      )}

      {tab==="questions" && (
        <div>
          {ratingQs.map(q=>{
            const a=avg(q.id);
            const dist=[1,2,3,4,5].map(v=>responses.filter(r=>r[q.id]===v).length);
            return (
              <div key={q.id} className="card mb3">
                <div style={{fontSize:11,color:"#6B7A8D",marginBottom:3}}>📌 {ar(q.section)} / {en(q.section)}</div>
                <div style={{fontSize:13,fontWeight:600,marginBottom:10,lineHeight:1.5}}>
                  {ar(q.text)}
                  {en(q.text)&&<span style={{fontSize:11,color:"#6B7A8D",display:"block",direction:"ltr",textAlign:"right",fontWeight:400,marginTop:2}}>{en(q.text)}</span>}
                </div>
                <div className="fl aic g3 mb3">
                  <div style={{fontSize:28,fontWeight:800,color:a>=4?"#2DADA0":a>=3?"#F39C12":"#E74C3C"}}>{a.toFixed(1)}</div>
                  <div><div style={{fontSize:11,color:"#6B7A8D"}}>avg / 5</div><div style={{fontSize:11,color:"#6B7A8D"}}>{responses.filter(r=>r[q.id]).length} responses</div></div>
                </div>
                <BarChart data={(q.labels||[]).map((lbl,i)=>({label:lbl,count:dist[i]}))} total={responses.length} color="#2E73B8"/>
              </div>
            );
          })}
          {choiceQs.map(q=>(
            <div key={q.id} className="card mb3">
              <div style={{fontSize:11,color:"#6B7A8D",marginBottom:3}}>📌 {ar(q.section)} / {en(q.section)}</div>
              <div style={{fontSize:13,fontWeight:600,marginBottom:10,lineHeight:1.5}}>
                {ar(q.text)}
                {en(q.text)&&<span style={{fontSize:11,color:"#6B7A8D",display:"block",direction:"ltr",textAlign:"right",fontWeight:400,marginTop:2}}>{en(q.text)}</span>}
              </div>
              <BarChart data={(q.options||[]).map(opt=>({label:opt,count:responses.filter(r=>r[q.id]===opt).length}))} total={responses.length} color="#4A9B3C"/>
            </div>
          ))}
        </div>
      )}

      {tab==="open" && (
        <div>
          {openAI && (
            <div className="ai-box mb4">
              <div className="ai-hdr">✨ تحليل الذكاء الاصطناعي<span className="en">AI Analysis — {en(openAI.qText)||ar(openAI.qText).substring(0,40)}</span></div>
              {aiLoading&&!openAI.result
                ?<div className="fl aic g2"><span className="spinner"/><span className="ts tmuted">جاري التحليل... / Analysing...</span></div>
                :<div className="ai-txt" style={{whiteSpace:"pre-wrap"}}>{openAI.result}</div>}
            </div>
          )}
          {openQs.map(q=>{
            const answers=responses.map(r=>r[q.id]).filter(Boolean);
            return (
              <div key={q.id} className="card mb3">
                <div style={{fontSize:11,color:"#6B7A8D",marginBottom:3}}>📌 {ar(q.section)} / {en(q.section)}</div>
                <div style={{fontSize:13,fontWeight:600,marginBottom:10,lineHeight:1.5}}>
                  {ar(q.text)}
                  {en(q.text)&&<span style={{fontSize:11,color:"#6B7A8D",display:"block",direction:"ltr",textAlign:"right",fontWeight:400,marginTop:2}}>{en(q.text)}</span>}
                </div>
                <div className="fl jb aic mb3">
                  <span className="badge badge-blue">{answers.length} إجابة / responses</span>
                  <button className="btn btn-teal btn-sm" onClick={()=>analyzeQ(q.id,q.text,answers)} disabled={!answers.length||aiLoading}>
                    {aiLoading&&openAI?.qId===q.id?<span className="spinner"/>:"✨ تحليل / Analyse"}
                  </button>
                </div>
                {answers.slice(0,5).map((ans,i)=>(
                  <div key={i} style={{padding:"9px 12px",background:"#F5F7FA",borderRadius:8,marginBottom:7,fontSize:12,lineHeight:1.6}}>"{ans}"</div>
                ))}
                {answers.length>5&&<p className="tx tmuted" style={{marginTop:3}}>+ {answers.length-5} إجابة أخرى / more responses</p>}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ── Report Page ───────────────────────────────────────────────────────
function ReportPage({questions, responses}) {
  const [report, setReport] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);

  const avgR = qId => {const v=responses.map(r=>r[qId]).filter(v=>v!=null);return v.length?(v.reduce((a,b)=>a+b,0)/v.length).toFixed(2):"0";};
  const overallAvg = responses.length>0?responses.reduce((s,r)=>s+(r.q34||0),0)/(responses.filter(r=>r.q34).length||1):0;

  const generate = async () => {
    if(!responses.length)return;
    setLoading(true);setError(null);
    try{
      const rqs=questions.filter(q=>q.type==="rating5");
      const oqs=questions.filter(q=>q.type==="open");
      const stats=rqs.map(q=>({ar_q:ar(q.text),en_q:en(q.text)||ar(q.text),sec:ar(q.section),avg:avgR(q.id)}));
      const openA=oqs.map(q=>({ar_q:ar(q.text),en_q:en(q.text)||ar(q.text),answers:responses.map(r=>r[q.id]).filter(Boolean).slice(0,8)}));
      const prompt=`You are a senior HR consultant. Write a comprehensive bilingual executive report (Arabic and English) based on ASAAS employee satisfaction survey results. Each section heading and paragraph must appear FIRST in Arabic, then immediately followed by the English translation on the next line.\n\nParticipants: ${responses.length}\nDate: ${new Date().toLocaleDateString("en-GB")}\n\nRating averages (out of 5):\n${stats.map(s=>`- [${s.sec}] AR: ${s.ar_q} | EN: ${s.en_q} → ${s.avg}/5`).join("\n")}\n\nSample open-ended answers:\n${openA.filter(o=>o.answers.length).slice(0,4).map(o=>`Q(AR): ${o.ar_q}\nQ(EN): ${o.en_q}\n${o.answers.slice(0,3).map((a,i)=>`${i+1}. ${a}`).join("\n")}`).join("\n\n")}\n\nWrite the report with EXACTLY these section headings (Arabic | English):\n## ملخص تنفيذي | Executive Summary\n## أبرز النتائج | Key Findings\n## مخاوف الموظفين | Employee Concerns\n## توقعات الموظفين | Employee Expectations\n## نقاط القوة | Strengths\n## مجالات التحسين | Areas for Improvement\n## التوصيات والإجراءات المقترحة | Recommendations & Proposed Actions\n## خطة تحسين التواصل المؤسسي | Institutional Communication Improvement Plan\n\nFor each section: write the Arabic paragraph first, then the English paragraph directly below it. Be specific and data-driven.`;
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:5000,messages:[{role:"user",content:prompt}]})});
      const data=await res.json();
      setReport(data.content?.find(b=>b.type==="text")?.text||"تعذر إنشاء التقرير. / Report generation failed.");
    }catch{setError("حدث خطأ. تأكد من الاتصال. / An error occurred. Check your connection.");}
    setLoading(false);
  };

  const ICONS={"ملخص تنفيذي":"📋","Executive Summary":"📋","أبرز النتائج":"🔍","مخاوف الموظفين":"⚠️","توقعات الموظفين":"💡","نقاط القوة":"✅","مجالات التحسين":"📈","التوصيات والإجراءات المقترحة":"🎯","خطة تحسين التواصل المؤسسي":"📣"};

  if(!responses.length) return (
    <div className="page"><div className="ok-screen">
      <div className="ok-icon">📄</div>
      <h2 style={{fontSize:19,fontWeight:800,color:"#1B3F6E",marginBottom:6}}>لا توجد بيانات كافية<span className="en">Insufficient data</span></h2>
      <p style={{color:"#6B7A8D",fontSize:13}}>يحتاج التقرير إلى إجابات لتحليلها. / The report needs responses to analyse.</p>
    </div></div>
  );

  return (
    <div className="page">
      <h2 className="sec-hdr">التقرير الشامل<span className="en">Comprehensive Report</span></h2>
      <p className="sec-sub">تقرير تنفيذي مُولَّد بالذكاء الاصطناعي<span className="en">AI-generated executive report</span></p>
      <div className="card" style={{background:"linear-gradient(135deg,#1B3F6E,#2E73B8)",color:"white",marginBottom:22}}>
        <div className="fl jb aic" style={{flexWrap:"wrap",gap:14}}>
          <div>
            <h3 style={{fontSize:18,fontWeight:800,color:"white",marginBottom:3}}>تقرير رضا الموظفين — شركة أساس</h3>
            <div style={{fontSize:12,color:"rgba(255,255,255,.8)",marginBottom:2}}>Employee Satisfaction Report — ASAAS Company</div>
            <p style={{fontSize:12,opacity:.75}}>{new Date().toLocaleDateString("en-GB",{year:"numeric",month:"long",day:"numeric"})} • {responses.length} مشارك / participants</p>
          </div>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:38,fontWeight:800,color:"#2DADA0"}}>{Math.round(overallAvg*20)}%</div>
            <div style={{fontSize:11,opacity:.8}}>الرضا العام / Overall Satisfaction</div>
          </div>
        </div>
      </div>

      {!report && (
        <div style={{textAlign:"center",padding:"36px 0"}}>
          <p style={{color:"#6B7A8D",marginBottom:6,fontSize:14}}>اضغط لإنشاء التقرير التنفيذي الكامل باستخدام الذكاء الاصطناعي.</p>
          <p style={{color:"#8A97A8",fontSize:12,marginBottom:20}}>Click to generate the full executive report using AI.</p>
          <button className="btn btn-primary" style={{padding:"13px 38px",fontSize:15}} onClick={generate} disabled={loading}>
            {loading?<span style={{display:"inline-flex",alignItems:"center",gap:8}}><span className="spinner"/>جاري الإنشاء... / Generating...</span>:"✨ إنشاء التقرير / Generate Report"}
          </button>
          {error&&<p style={{color:"#E74C3C",marginTop:12,fontSize:13}}>{error}</p>}
        </div>
      )}

      {report && (
        <div>
          <div className="fl jb aic mb4">
            <span className="badge badge-teal">✨ مُولَّد بالذكاء الاصطناعي / AI-generated</span>
            <button className="btn btn-ghost btn-sm" onClick={generate} disabled={loading}>{loading?"جاري...":" إعادة إنشاء / Regenerate"}</button>
          </div>
          {report.split(/## /).filter(Boolean).map((s,i)=>{
            const lines=s.trim().split("\n");
            const rawTitle=lines[0].trim();
            const titleAr=rawTitle.split("|")[0].trim();
            const titleEn=rawTitle.split("|")[1]?.trim()||rawTitle;
            const content=lines.slice(1).join("\n").trim();
            const icon=ICONS[titleAr]||ICONS[titleEn]||"📌";
            return (
              <div key={i} className="card" style={{marginBottom:14}}>
                <h3 style={{fontSize:16,fontWeight:700,color:"#1B3F6E",marginBottom:12,display:"flex",alignItems:"flex-start",gap:8}}>
                  <span>{icon}</span>
                  <span>
                    {titleAr}
                    <span style={{fontSize:12,fontWeight:400,color:"#6B7A8D",display:"block",direction:"ltr",textAlign:"right",marginTop:2}}>{titleEn}</span>
                  </span>
                </h3>
                <div style={{fontSize:13,color:"#1A2332",lineHeight:1.85}}>
                  {content.split("\n").map((line,j)=>{
                    if(!line.trim())return <div key={j} style={{height:5}}/>;
                    if(line.startsWith("**")&&line.endsWith("**"))return <div key={j} style={{fontWeight:700,color:"#1B3F6E",marginTop:10,marginBottom:4}}>{line.replace(/\*\*/g,"")}</div>;
                    if(line.startsWith("- ")||line.startsWith("• "))return <div key={j} style={{paddingRight:14,marginBottom:5,display:"flex",gap:7}}><span style={{color:"#2DADA0",flexShrink:0}}>◆</span><span>{line.substring(2)}</span></div>;
                    if(/^\d+\./.test(line))return <div key={j} style={{paddingRight:6,marginBottom:5}}><strong style={{color:"#1B3F6E"}}>{line.split(".")[0]}.</strong>{line.split(".").slice(1).join(".")}</div>;
                    return <p key={j} style={{marginBottom:7}}>{line}</p>;
                  })}
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ── Root App ──────────────────────────────────────────────────────────
function App() {
  const [unlocked, setUnlocked] = useState(()=>lsGet("asaas_auth")===true);
  const [showSetup, setShowSetup] = useState(false);
  const [page, setPage] = useState("survey");
  const [questions, setQuestions] = useState(()=>lsGet("asaas_q")||INITIAL_QUESTIONS);
  const [responses, setResponses] = useState(()=>lsGet("asaas_r")||[]);
  const [surveyActive, setSurveyActive] = useState(()=>{const v=lsGet("asaas_on");return v!==null?v:true;});
  const [analysisCache, setAnalysisCache] = useState({});
  const [syncing, setSyncing] = useState(false);
  const [syncError, setSyncError] = useState(null);
  const [lastSync, setLastSync] = useState(null);

  // Load shared data from cloud on mount
  useEffect(()=>{
    (async()=>{
      setSyncing(true);
      invalidateCache();
      try{
        const [qs, rs, on] = await Promise.all([
          storageGet("asaas_q"),
          storageGet("asaas_r"),
          storageGet("asaas_on")
        ]);
        if(qs) setQuestions(qs);
        if(rs) setResponses(rs);
        if(on!==null) setSurveyActive(on);
        setLastSync(new Date());
        setSyncError(null);
      }catch(e){
        setSyncError("تعذّر المزامنة / Sync failed");
      }
      setSyncing(false);
    })();
  },[]);

  const saveQ = qs=>{setQuestions(qs);storageSet("asaas_q",qs);};
  const saveR = rs=>{setResponses(rs);storageSet("asaas_r",rs);};
  const toggleOn = v=>{setSurveyActive(v);storageSet("asaas_on",v);};
  const handleSubmit = a=>{
    const rs=[...responses,{...a,id:Date.now(),submittedAt:new Date().toISOString()}];
    saveR(rs);
  };

  const handleUnlock = () => { lsSet("asaas_auth",true); setUnlocked(true); };
  const handleLock = () => { lsSet("asaas_auth",false); setUnlocked(false); };

  // Rename / add option inline
  const handleRenameOption = (qId, optIdx, newName, lang='ar') => {
    const updated = questions.map(q => {
      if(q.id !== qId) return q;
      const opts = [...q.options];
      if(optIdx === "ADD") {
        opts.push("خيار جديد|New Option");
        return {...q, options: opts};
      }
      if(optIdx === "DEL") {
        // newName here holds the index to delete
        opts.splice(newName, 1);
        return {...q, options: opts};
      }
      const old = opts[optIdx] || "";
      const arPart = old.split("|")[0] || "";
      const enPart = old.split("|")[1] || "";
      opts[optIdx] = lang === 'en'
        ? `${arPart}|${newName}`
        : `${newName}|${enPart}`;
      return {...q, options: opts};
    });
    saveQ(updated);
  };

  // Edit question text (AR or EN)
  const handleEditQuestion = (qId, newVal, lang='ar') => {
    const updated = questions.map(q => {
      if(q.id !== qId) return q;
      const arPart = q.text.split("|")[0] || "";
      const enPart = q.text.split("|")[1] || "";
      const newText = lang === 'en'
        ? `${arPart}|${newVal}`
        : `${newVal}|${enPart}`;
      return {...q, text: newText};
    });
    saveQ(updated);
  };

  // Move question (drag-drop or arrow buttons)
  const handleMoveQuestion = (fromId, toIdOrDir) => {
    const qs = [...questions];
    const fromIdx = qs.findIndex(q=>q.id===fromId);
    if(fromIdx===-1) return;
    if(toIdOrDir==='UP') {
      if(fromIdx===0) return;
      [qs[fromIdx-1],qs[fromIdx]]=[qs[fromIdx],qs[fromIdx-1]];
    } else if(toIdOrDir==='DOWN') {
      if(fromIdx===qs.length-1) return;
      [qs[fromIdx],qs[fromIdx+1]]=[qs[fromIdx+1],qs[fromIdx]];
    } else {
      // drag-drop: move fromId before toId
      const toIdx = qs.findIndex(q=>q.id===toIdOrDir);
      if(toIdx===-1) return;
      const [moved] = qs.splice(fromIdx,1);
      const insertAt = qs.findIndex(q=>q.id===toIdOrDir);
      qs.splice(insertAt,0,moved);
    }
    saveQ(qs);
  };

  // Delete a question
  const handleDeleteQuestion = (qId) => {
    saveQ(questions.filter(q=>q.id!==qId));
  };

  // Add a new question
  const handleAddQuestion = (newQ) => {
    // Insert after the last question of the same section
    const qs = [...questions];
    let lastIdx = -1;
    qs.forEach((q,i)=>{ if(q.section===newQ.section) lastIdx=i; });
    if(lastIdx===-1) qs.push(newQ);
    else qs.splice(lastIdx+1,0,newQ);
    saveQ(qs);
  };

  // Edit section name (AR or EN)
  const handleEditSection = (secKey, newVal, lang='ar') => {
    const updated = questions.map(q => {
      if(q.section !== secKey) return q;
      const arPart = q.section.split("|")[0] || "";
      const enPart = q.section.split("|")[1] || "";
      const newSec = lang === 'en'
        ? `${arPart}|${newVal}`
        : `${newVal}|${enPart}`;
      return {...q, section: newSec};
    });
    saveQ(updated);
  };

  // No full-app gate — visitors access survey freely

  const NAV=[
    ["survey","الاستبيان","Survey","📋"],
    ["admin","لوحة التحكم","Admin","⚙️"],
    ["analytics","التحليلات","Analytics","📊"],
    ["report","التقرير","Report","📄"],
  ];

  return (
    <>
      <GlobalStyle/>
      <div className="app">
        <nav className="nav">
          <div className="nav-logo">
            <div className="nav-logo-box">
              <svg viewBox="0 0 28 28" width="22" height="22">
                <rect x="2" y="2" width="11" height="11" rx="2" fill="#2DADA0"/>
                <rect x="15" y="2" width="11" height="11" rx="2" fill="#4A9B3C"/>
                <rect x="2" y="15" width="11" height="11" rx="2" fill="#1B3F6E"/>
                <rect x="15" y="15" width="11" height="11" rx="2" fill="#5BB3E0"/>
              </svg>
            </div>
            <span className="nav-title">
              أساس | ASAAS
              <span className="en" style={{display:"flex",alignItems:"center",gap:4}}>
                Employee Survey Platform
                {syncing && <span style={{display:"inline-flex",alignItems:"center",gap:3,fontSize:9,opacity:.8}}>
                  <span style={{width:8,height:8,border:"1.5px solid rgba(255,255,255,.4)",borderTopColor:"#2DADA0",borderRadius:"50%",display:"inline-block",animation:"spin .8s linear infinite"}}/>
                  مزامنة...
                </span>}
                {!syncing && lastSync && <span style={{fontSize:9,opacity:.6}}>✓ {lastSync.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"})}</span>}
                {syncError && <span style={{fontSize:9,color:"#FAC775"}}>⚠ {syncError}</span>}
              </span>
            </span>
          </div>
          <div className="nav-tabs">
            {NAV.map(([id,ar_,en_,ic])=>(
              <button key={id} className={`nav-tab${page===id?" active":""}`} onClick={()=>setPage(id)}>
                {id==="analytics"&&responses.length>0&&<span className="nav-badge">{responses.length}</span>}
                {ar_}<span className="en">{en_}</span>
              </button>
            ))}
            {unlocked && (
              <button className="nav-tab" onClick={()=>setShowSetup(true)} title="إعداد المزامنة / Sync Setup"
                style={{marginRight:4,opacity:.7,fontSize:14,border:"1px solid rgba(255,255,255,.2)",borderRadius:6}}>
                ⚙ <span style={{fontSize:9,display:"block",opacity:.7}}>مزامنة/Sync</span>
              </button>
            )}
            {unlocked
              ? <button className="nav-tab" onClick={handleLock} title="تسجيل خروج / Logout" style={{opacity:.7,fontSize:14,border:"1px solid rgba(255,255,255,.2)",borderRadius:6}}>🔓 <span style={{fontSize:9,display:"block",opacity:.7}}>خروج/Logout</span></button>
              : <button className="nav-tab" onClick={()=>setPage("admin")} title="دخول الإدارة / Admin login" style={{opacity:.5,fontSize:14}}>🔐 <span style={{fontSize:9,display:"block",opacity:.7}}>إدارة/Admin</span></button>
            }
          </div>
        </nav>

        {page==="survey"   && <SurveyPage questions={questions} surveyActive={surveyActive} onSubmit={handleSubmit}
            isAdmin={unlocked}
            onRenameOption={handleRenameOption}
            onEditQuestion={handleEditQuestion}
            onEditSection={handleEditSection}
            onMoveQuestion={handleMoveQuestion}
            onDeleteQuestion={handleDeleteQuestion}
            onAddQuestion={handleAddQuestion}
          />}
        {page==="admin"    && (unlocked ? <AdminPage questions={questions} responses={responses} surveyActive={surveyActive} onToggleActive={toggleOn} onSaveQuestions={saveQ} onClearResponses={()=>{saveR([]);setAnalysisCache({});}} /> : <AdminGate onUnlock={handleUnlock}/>)}
        {page==="analytics"&& (unlocked ? <AnalyticsPage questions={questions} responses={responses} analysisCache={analysisCache} setAnalysisCache={setAnalysisCache}/> : <AdminGate onUnlock={handleUnlock}/>)}
        {page==="report"   && (unlocked ? <ReportPage questions={questions} responses={responses}/> : <AdminGate onUnlock={handleUnlock}/>)}

        {showSetup && <GistSetupModal onClose={saved=>{
          setShowSetup(false);
          if(saved){
            invalidateCache();
            // Reload data from the newly configured Gist
            (async()=>{
              setSyncing(true);
              const [qs,rs,on]=await Promise.all([storageGet("asaas_q"),storageGet("asaas_r"),storageGet("asaas_on")]);
              if(qs)setQuestions(qs);
              if(rs)setResponses(rs);
              if(on!==null)setSurveyActive(on);
              setLastSync(new Date());
              setSyncing(false);
            })();
          }
        }}/>}

        <div className="fnav fl">
          {NAV.map(([id,ar_,en_,ic])=>(
            <div key={id} className={`fni${page===id?" active":""}`} onClick={()=>setPage(id)}>
              <span className="fni-icon">{ic}</span>
              <span>{ar_}</span>
              <span style={{fontSize:8,opacity:.8}}>{en_}</span>
            </div>
          ))}
        </div>
      </div>
    </>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
