<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#315C3B">
<title>تقويم أساس 2026 — معاينة عيدية</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --asaas-green:#315C3B;
  --asaas-green-dark:#234229;
  --asaas-beige:#e8dfd3;
  --asaas-beige-deep:#d8ccba;
  --asaas-ink:#3a2820;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:'Tajawal','Amiri',system-ui,sans-serif;
  background:linear-gradient(180deg,#f1ebe0 0%,#e0d4be 100%);
  color:var(--asaas-ink);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
.demo-banner{
  position:fixed;top:14px;left:14px;z-index:100;
  background:rgba(58,40,32,.92);color:#f1ebe0;
  padding:10px 16px;border-radius:10px;
  font-size:13px;line-height:1.5;
  box-shadow:0 6px 20px rgba(0,0,0,.18);
  max-width:280px;
  direction:ltr;text-align:left;
}
.demo-banner b{color:#e8c98a}
.demo-banner button{
  margin-top:8px;background:#c9a961;color:#3a2820;border:none;
  padding:6px 12px;border-radius:6px;font-weight:600;cursor:pointer;font-size:12px;
  font-family:inherit;
}
.demo-banner button:hover{background:#d9b97c}

/* Mock of the ASAAS calendar layout */
header{
  background:var(--asaas-green);
  color:#f1ebe0;
  padding:24px 20px 30px;
  text-align:center;
  border-bottom:3px solid var(--asaas-green-dark);
}
header img{height:64px;width:auto;margin-bottom:8px;opacity:.95}
header .title-ar{font-size:22px;font-weight:700;letter-spacing:.5px;margin:6px 0 2px}
header .title-en{font-size:11px;letter-spacing:3px;opacity:.75;direction:ltr}

.year-label{
  text-align:center;font-size:60px;font-weight:700;
  color:var(--asaas-green);margin:24px 0 8px;letter-spacing:2px;direction:ltr;
}
.year-sub{text-align:center;color:var(--asaas-green-dark);opacity:.7;margin-bottom:28px;font-size:14px}

.cal-wrap{max-width:900px;margin:0 auto;padding:0 20px 60px}
.cal-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px}
.month{
  background:rgba(255,255,255,.55);
  border:1px solid rgba(58,40,32,.12);
  border-radius:14px;
  padding:14px 12px 16px;
  backdrop-filter:blur(4px);
}
.month h3{
  margin:0 0 10px;color:var(--asaas-green);
  font-size:15px;font-weight:700;text-align:center;
  border-bottom:1px solid rgba(58,40,32,.1);padding-bottom:8px;
}
.days{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;font-size:10px;direction:rtl}
.dow{color:var(--asaas-green);opacity:.6;text-align:center;font-weight:700;padding:2px 0}
.day{
  text-align:center;padding:3px 0;
  color:var(--asaas-ink);opacity:.75;
  border-radius:4px;
}
.day.weekend{color:#9c5d3a}
.day.empty{opacity:0}

footer{text-align:center;padding:30px 20px;color:var(--asaas-green-dark);opacity:.6;font-size:12px;letter-spacing:1px}
</style>
</head>
<body>

<div class="demo-banner">
  <div><b>Demo preview</b></div>
  <div>This file shows exactly how the greeting will appear on your ASAAS calendar site. It auto-plays on load.</div>
  <button onclick="location.reload()">Replay greeting ↻</button>
</div>

<header>
  <img src="https://asaas-calendar-2026.vercel.app/images/Vertical_ASAAS_Logo.png" alt="ASAAS" onerror="this.style.display='none'">
  <div class="title-ar">تقويم أساس المؤسسي</div>
  <div class="title-en">ASAAS · CORPORATE CALENDAR</div>
</header>

<div class="year-label">2026</div>
<div class="year-sub">السنوي</div>

<div class="cal-wrap">
  <div class="cal-grid" id="calGrid"></div>
</div>

<footer>ASAAS · التقويم المؤسسي · 2026 — معاينة محلية</footer>

<script>
// Build a quick mock of the 12-month grid so the overlay has rich context to sit over
const months = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
const dows = ['أحد','اثن','ثلا','أرب','خمي','جمع','سبت'];
const grid = document.getElementById('calGrid');
months.forEach((m, i) => {
  const startDay = (i * 3 + 4) % 7; // pseudo-randomly varied per month for visual richness
  const dim = [31,28,31,30,31,30,31,31,30,31,30,31][i];
  let html = `<div class="month"><h3>${m}</h3><div class="days">`;
  dows.forEach(d => html += `<div class="dow">${d}</div>`);
  for (let s=0; s<startDay; s++) html += `<div class="day empty">·</div>`;
  for (let d=1; d<=dim; d++) {
    const col = (startDay + d - 1) % 7;
    const isWk = (col === 5 || col === 6); // Fri/Sat highlight
    html += `<div class="day${isWk ? ' weekend' : ''}">${d}</div>`;
  }
  html += `</div></div>`;
  grid.insertAdjacentHTML('beforeend', html);
});
</script>

AgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgMCvnv8HEWGinZru+88AAAAASUVORK5CYII=";

  // Lifecycle (ms): fade-in -> hold -> fade-out
  const FADE_IN  = 800;
  const HOLD     = 1900;
  const FADE_OUT = 800;

  // Confetti palette — tuned to ASAAS green + warm calligraphy tones
  const COLORS = ['#315C3B', '#c9a961', '#3a2820', '#d9a574', '#9c5d3a', '#e8c98a', '#7a4a2b'];

  function run() {
    // Inject styles
    const style = document.createElement('style');
    style.textContent = `
      .eid-greeting-overlay{position:fixed;inset:0;z-index:2147483646;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;opacity:0;transition:opacity ${FADE_IN}ms cubic-bezier(.22,.61,.36,1)}
      .eid-greeting-overlay.eid-out{transition:opacity ${FADE_OUT}ms cubic-bezier(.4,0,.7,.2)}
      .eid-greeting-overlay.eid-in{opacity:1}
      .eid-greeting-img{width:min(46vw,360px);max-width:80vw;max-height:60vh;height:auto;transform:scale(.88) translateY(8px);transition:transform 1200ms cubic-bezier(.22,1.4,.36,1);filter:drop-shadow(0 6px 24px rgba(58,40,32,.18));user-select:none;-webkit-user-drag:none}
      .eid-greeting-overlay.eid-in .eid-greeting-img{transform:scale(1) translateY(0)}
      .eid-greeting-confetti{position:fixed;inset:0;z-index:2147483645;pointer-events:none;width:100%;height:100%}
      @media (prefers-reduced-motion: reduce){.eid-greeting-img{transition:none;transform:none}}
    `;
    document.head.appendChild(style);

    // Build overlay
    const overlay = document.createElement('div');
    overlay.className = 'eid-greeting-overlay';
    overlay.setAttribute('aria-hidden', 'true');
    const img = document.createElement('img');
    img.className = 'eid-greeting-img';
    img.alt = 'من عساكم عواده — كل عام وأنتم بخير';
    img.src = CALLIGRAPHY_SRC;
    overlay.appendChild(img);

    const canvas = document.createElement('canvas');
    canvas.className = 'eid-greeting-confetti';
    canvas.setAttribute('aria-hidden', 'true');

    document.body.appendChild(canvas);
    document.body.appendChild(overlay);

    // Canvas confetti
    const ctx = canvas.getContext('2d');
    const DPR = Math.min(window.devicePixelRatio || 1, 2);
    function resize() {
      canvas.width  = innerWidth  * DPR;
      canvas.height = innerHeight * DPR;
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    }
    resize();
    window.addEventListener('resize', resize);

    const PARTICLE_COUNT = Math.min(120, Math.max(60, Math.floor(innerWidth / 12)));
    const particles = [];
    function makeParticle(initial) {
      return {
        x: Math.random() * innerWidth,
        y: initial ? -Math.random() * innerHeight * 0.6 : -20 - Math.random() * 40,
        vx: (Math.random() - 0.5) * 1.6,
        vy: 1.2 + Math.random() * 2.6,
        rot: Math.random() * Math.PI * 2,
        vr: (Math.random() - 0.5) * 0.18,
        w: 5 + Math.random() * 7,
        h: 9 + Math.random() * 9,
        color: COLORS[Math.floor(Math.random() * COLORS.length)],
        phase: Math.random() * Math.PI * 2,
        shape: Math.random() < 0.25 ? 'circle' : 'rect',
        wobble: 0.6 + Math.random() * 0.9
      };
    }
    for (let i = 0; i < PARTICLE_COUNT; i++) particles.push(makeParticle(true));

    let spawning = true;
    let alpha = 0;
    let raf;
    const t0 = performance.now();

    function frame(now) {
      const elapsed = now - t0;
      // Alpha envelope mirrors overlay
      if (elapsed < FADE_IN)                       alpha = elapsed / FADE_IN;
      else if (elapsed < FADE_IN + HOLD)           alpha = 1;
      else if (elapsed < FADE_IN + HOLD + FADE_OUT) alpha = 1 - (elapsed - FADE_IN - HOLD) / FADE_OUT;
      else                                          alpha = 0;

      ctx.clearRect(0, 0, innerWidth, innerHeight);
      ctx.globalAlpha = Math.max(0, Math.min(1, alpha));

      for (let i = 0; i < particles.length; i++) {
        const p = particles[i];
        p.x += p.vx + Math.sin((now / 700) + p.phase) * p.wobble;
        p.y += p.vy;
        p.rot += p.vr;
        if (p.y > innerHeight + 30) {
          if (spawning) {
            particles[i] = makeParticle(false);
          } else {
            // let it drift off without respawn
            p.y = innerHeight + 9999;
          }
          continue;
        }
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        ctx.fillStyle = p.color;
        if (p.shape === 'rect') {
          ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
        } else {
          ctx.beginPath();
          ctx.arc(0, 0, p.w / 2, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      }

      if (alpha <= 0 && elapsed > FADE_IN + HOLD + FADE_OUT) {
        cleanup();
        return;
      }
      raf = requestAnimationFrame(frame);
    }

    function cleanup() {
      cancelAnimationFrame(raf);
      window.removeEventListener('resize', resize);
      overlay.remove();
      canvas.remove();
      style.remove();
    }

    // Trigger entrance shortly after mount
    requestAnimationFrame(() => {
      requestAnimationFrame(() => overlay.classList.add('eid-in'));
    });
    raf = requestAnimationFrame(frame);

    // Schedule exit
    setTimeout(() => {
      spawning = false;
      overlay.classList.remove('eid-in');
      overlay.classList.add('eid-out');
    }, FADE_IN + HOLD);

    // Optional: dismiss on Escape
    function onKey(e) {
      if (e.key === 'Escape') {
        spawning = false;
        overlay.classList.remove('eid-in');
        overlay.classList.add('eid-out');
        document.removeEventListener('keydown', onKey);
      }
    }
    document.addEventListener('keydown', onKey);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', run, { once: true });
  } else {
    run();
  }
})();
