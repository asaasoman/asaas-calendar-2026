<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تحدي توقعات كأس العالم 2026 | VISIT OMAN</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flag-icons@7.2.3/css/flag-icons.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">

<!-- Firebase (compat) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
/* ============================== DESIGN TOKENS ============================== */
:root{
  --bg:#F4ECDA;
  --bg-2:#EDE2C8;
  --surface:#FFFDF8;
  --ink:#1F2A24;
  --muted:rgba(31,42,36,.62);
  --line:rgba(31,42,36,.13);
  --primary:#0B5351;
  --primary-dark:#073B3A;
  --primary-soft:rgba(11,83,81,.10);
  --accent:#C1502E;
  --accent-soft:rgba(193,80,46,.12);
  --gold:#C99A3E;
  --gold-soft:rgba(201,154,62,.15);
  --success:#2F7D5A;
  --success-soft:rgba(47,125,90,.13);
  --danger:#B23A2E;
  --danger-soft:rgba(178,58,46,.12);
  --radius:16px;
  --radius-sm:10px;
  --shadow:0 6px 24px rgba(31,42,36,.08), 0 1px 3px rgba(31,42,36,.06);
  --font-display:'Aref Ruqaa', serif;
  --font-body:'Tajawal', sans-serif;
}
[data-theme="dark"]{
  --bg:#10201D;
  --bg-2:#0B1715;
  --surface:#16302B;
  --ink:#F2EBD9;
  --muted:rgba(242,235,217,.62);
  --line:rgba(242,235,217,.13);
  --primary:#3FA79C;
  --primary-dark:#2C7E76;
  --primary-soft:rgba(63,167,156,.16);
  --accent:#E08A5E;
  --accent-soft:rgba(224,138,94,.16);
  --gold:#E0BD6E;
  --gold-soft:rgba(224,189,110,.18);
  --success:#4FBE8A;
  --success-soft:rgba(79,190,138,.16);
  --danger:#E2766A;
  --danger-soft:rgba(226,118,106,.16);
  --shadow:0 6px 24px rgba(0,0,0,.35), 0 1px 3px rgba(0,0,0,.3);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:
    radial-gradient(900px 500px at 90% -10%, var(--gold-soft), transparent 60%),
    radial-gradient(900px 500px at -10% 10%, var(--primary-soft), transparent 60%),
    var(--bg);
  color:var(--ink);
  font-family:var(--font-body);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
  transition:background .3s,color .3s;
}
h1,h2,h3,.display{font-family:var(--font-display);}
.muted{color:var(--muted);}
img,svg{max-width:100%;}
button{font-family:inherit;cursor:pointer;}
input,select,button{font-family:inherit;}
.fi{border-radius:3px;box-shadow:0 0 0 1px var(--line);}

/* ============================== LAYOUT ============================== */
.app-shell{max-width:1180px;margin:0 auto;padding:18px 18px 80px;}
.topbar{
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  padding:14px 20px;background:var(--surface);border:1px solid var(--line);
  border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:18px;
  position:sticky;top:10px;z-index:50;
}
.brand{display:flex;align-items:center;gap:12px;}
.brand-mark{
  width:42px;height:42px;border-radius:50%;
  background:linear-gradient(145deg,var(--primary),var(--primary-dark));
  display:flex;align-items:center;justify-content:center;color:#fff;
  font-family:var(--font-display);font-size:22px;font-weight:700;flex:none;
}
.brand-text h1{margin:0;font-size:19px;line-height:1.1;}
.brand-text span{font-size:11px;color:var(--muted);letter-spacing:.5px;}
.top-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.icon-btn{
  width:38px;height:38px;border-radius:50%;border:1px solid var(--line);
  background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:16px;
  transition:transform .15s, background .15s;
}
.icon-btn:hover{transform:translateY(-1px);background:var(--primary-soft);}
.pill-name{
  display:flex;align-items:center;gap:8px;background:var(--primary-soft);
  color:var(--primary-dark);padding:6px 14px;border-radius:999px;font-weight:700;font-size:13px;
}
[data-theme="dark"] .pill-name{color:var(--gold);}

.tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
.tab-btn{
  padding:10px 18px;border-radius:999px;border:1px solid var(--line);
  background:var(--surface);color:var(--ink);font-weight:700;font-size:14px;
  display:flex;align-items:center;gap:6px;transition:all .15s;
}
.tab-btn.active{background:var(--primary);color:#fff;border-color:var(--primary);box-shadow:var(--shadow);}
.tab-btn:hover:not(.active){background:var(--primary-soft);}

.card{
  background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  box-shadow:var(--shadow);padding:20px;margin-bottom:16px;
  animation:fadeIn .35s ease;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
.grid{display:grid;gap:16px;}
.grid-auto{grid-template-columns:repeat(auto-fill,minmax(260px,1fr));}

.badge{
  display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:999px;
  font-size:11px;font-weight:700;
}
.badge.open{background:var(--success-soft);color:var(--success);}
.badge.upcoming{background:var(--gold-soft);color:var(--gold);}
.badge.closed{background:var(--danger-soft);color:var(--danger);}

.btn{
  border:none;border-radius:999px;padding:11px 22px;font-weight:700;font-size:14px;
  background:var(--primary);color:#fff;transition:transform .15s,opacity .15s;
}
.btn:hover{transform:translateY(-1px);}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none;}
.btn.secondary{background:var(--surface);color:var(--ink);border:1px solid var(--line);}
.btn.accent{background:var(--accent);}
.btn.gold{background:var(--gold);color:#2b2106;}
.btn.sm{padding:7px 14px;font-size:12px;}
.btn.danger{background:var(--danger);}

input[type=text],input[type=password],input[type=number],select{
  border:1px solid var(--line);border-radius:var(--radius-sm);padding:10px 12px;
  background:var(--bg);color:var(--ink);font-size:14px;width:100%;
}
input[type=number]{text-align:center;}

/* ===== Register screen ===== */
.register-wrap{
  min-height:70vh;display:flex;align-items:center;justify-content:center;
}
.register-card{
  max-width:420px;width:100%;text-align:center;padding:36px 28px;
}
.register-card h2{font-size:26px;margin:6px 0 4px;}
.register-card p{color:var(--muted);font-size:14px;margin-bottom:22px;}
.suggest-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;justify-content:center;}
.suggest-chip{
  background:var(--primary-soft);color:var(--primary-dark);padding:4px 12px;border-radius:999px;
  font-size:12px;font-weight:600;border:none;
}
[data-theme="dark"] .suggest-chip{color:var(--gold);}

/* ===== Countdown ===== */
.countdown-bar{
  background:linear-gradient(120deg,var(--primary),var(--primary-dark));
  color:#fff;border-radius:var(--radius);padding:18px 22px;margin-bottom:18px;
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;
  box-shadow:var(--shadow);
}
.countdown-bar .label{font-size:13px;opacity:.85;}
.countdown-bar .stage-name{font-family:var(--font-display);font-size:22px;}
.countdown-nums{display:flex;gap:10px;}
.countdown-nums div{text-align:center;}
.countdown-nums .n{font-size:24px;font-weight:900;font-family:var(--font-display);}
.countdown-nums .u{font-size:10px;opacity:.8;}

/* ===== Total bar ===== */
.total-bar{
  position:sticky;top:84px;z-index:40;background:var(--surface);border:1px solid var(--line);
  border-radius:999px;padding:10px 18px;margin-bottom:16px;box-shadow:var(--shadow);
  display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;
}
.total-bar .val{font-family:var(--font-display);font-size:22px;color:var(--accent);font-weight:700;}

/* ===== Match card ===== */
.match-card{
  border:1px solid var(--line);border-radius:var(--radius-sm);padding:14px;background:var(--bg);
  position:relative;
}
.match-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;font-size:11px;color:var(--muted);}
.match-row{display:flex;align-items:center;justify-content:space-between;gap:10px;}
.team{display:flex;align-items:center;gap:8px;flex:1;min-width:0;}
.team.right{flex-direction:row-reverse;text-align:left;}
.team .name{font-size:13px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.team .name.tbd{color:var(--muted);font-weight:500;font-style:normal;font-size:12px;}
.score-inputs{display:flex;align-items:center;gap:6px;}
.score-inputs input{width:46px;height:42px;padding:0;font-size:16px;font-weight:700;}
.score-vs{color:var(--muted);font-size:12px;}
.pen-row{
  margin-top:10px;padding-top:10px;border-top:1px dashed var(--line);
  display:flex;align-items:center;gap:8px;font-size:12px;flex-wrap:wrap;
}
.pen-choice{display:flex;gap:6px;}
.pen-choice button{
  border:1px solid var(--line);background:var(--surface);border-radius:8px;padding:5px 10px;font-size:11px;font-weight:700;
}
.pen-choice button.sel{background:var(--accent);color:#fff;border-color:var(--accent);}
.poll-row{margin-top:10px;font-size:11px;}
.poll-bar{height:6px;border-radius:4px;background:var(--line);overflow:hidden;display:flex;margin-top:4px;}
.poll-bar span{height:100%;}
.locked-tag{position:absolute;top:10px;left:10px;font-size:10px;background:var(--danger-soft);color:var(--danger);padding:2px 8px;border-radius:999px;font-weight:700;}

/* ===== Bracket ===== */
.bracket-toggle{display:flex;gap:8px;margin-bottom:14px;}
.bracket-wrap{overflow-x:auto;padding:10px 0 24px;}
.bracket{display:flex;gap:38px;min-width:max-content;padding:4px;}
.bracket-col{display:flex;flex-direction:column;justify-content:space-around;gap:18px;min-width:210px;}
.bracket-col .col-title{text-align:center;font-size:12px;font-weight:800;color:var(--primary);margin-bottom:4px;letter-spacing:.5px;}
.b-match{
  background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:10px;position:relative;
}
.b-team{display:flex;align-items:center;justify-content:space-between;gap:6px;padding:4px 2px;font-size:12px;font-weight:700;}
.b-team .nm{display:flex;align-items:center;gap:6px;overflow:hidden;}
.b-team .nm span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.b-team.winner{color:var(--success);}
.b-divider{height:1px;background:var(--line);margin:2px 0;}
.b-connector{position:absolute;top:50%;right:-19px;width:19px;height:2px;background:var(--gold);}
.b-connector.left{right:auto;left:-19px;}

/* ===== Leaderboard ===== */
.lb-row{
  display:flex;align-items:center;gap:12px;padding:12px 10px;border-radius:12px;border:1px solid transparent;
}
.lb-row.me{background:var(--gold-soft);border-color:var(--gold);}
.lb-rank{width:32px;text-align:center;font-weight:900;font-family:var(--font-display);font-size:18px;color:var(--muted);}
.lb-avatar{
  width:36px;height:36px;border-radius:50%;background:var(--primary-soft);color:var(--primary-dark);
  display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;flex:none;
}
[data-theme="dark"] .lb-avatar{color:var(--gold);}
.lb-name{flex:1;font-weight:700;font-size:14px;}
.lb-pts{font-weight:900;font-family:var(--font-display);font-size:18px;color:var(--accent);position:relative;}
.lb-delta{
  position:absolute;top:-16px;left:50%;transform:translateX(-50%);font-size:11px;color:var(--success);font-weight:800;
  animation:floatUp 1.6s ease forwards;
}
@keyframes floatUp{0%{opacity:0;transform:translate(-50%,4px);}20%{opacity:1;}100%{opacity:0;transform:translate(-50%,-16px);}}
.me-card{
  display:flex;align-items:center;gap:14px;padding:18px;border-radius:var(--radius);
  background:linear-gradient(120deg,var(--accent),var(--primary-dark));color:#fff;margin-bottom:16px;
}
.me-card .big{font-family:var(--font-display);font-size:30px;font-weight:800;}
.lb-subtabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.lb-subtabs button{
  border:1px solid var(--line);background:var(--surface);padding:6px 14px;border-radius:999px;font-size:12px;font-weight:700;
}
.lb-subtabs button.active{background:var(--primary);color:#fff;border-color:var(--primary);}

/* ===== Admin ===== */
.admin-login{max-width:340px;margin:40px auto;text-align:center;}
table.admin-table{width:100%;border-collapse:collapse;font-size:13px;}
table.admin-table th,table.admin-table td{padding:8px 10px;border-bottom:1px solid var(--line);text-align:right;}
table.admin-table th{color:var(--muted);font-weight:700;font-size:12px;}
.progress-mini{display:flex;gap:3px;}
.progress-mini span{width:10px;height:10px;border-radius:3px;background:var(--line);}
.progress-mini span.full{background:var(--success);}
.progress-mini span.partial{background:var(--gold);}
.group-team-row{display:grid;grid-template-columns:1.6fr repeat(5,55px);gap:6px;align-items:center;margin-bottom:6px;}
.group-team-row label{font-size:11px;color:var(--muted);}
.admin-section-title{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:800;margin:18px 0 10px;color:var(--primary);}
.last-update{font-size:12px;color:var(--muted);margin-top:8px;}
.waiting-card{text-align:center;padding:50px 20px;}
.waiting-card .icon{font-size:46px;margin-bottom:10px;}

/* ===== Share card preview ===== */
.share-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
canvas#shareCanvas{display:none;}

/* ===== Misc ===== */
.empty{text-align:center;padding:40px 16px;color:var(--muted);}
.section-title{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.section-title h2{margin:0;font-size:20px;}
.toast{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--bg);
  padding:10px 20px;border-radius:999px;font-size:13px;font-weight:700;z-index:200;box-shadow:var(--shadow);
  animation:fadeIn .25s ease;
}
@media (max-width:640px){
  .topbar{flex-wrap:wrap;}
  .total-bar{top:auto;position:relative;}
}
</style>
</head>
<body>
<div id="app" class="app-shell"></div>
<canvas id="shareCanvas" width="900" height="560"></canvas>

<script>
/* =========================================================================
   SECTION: CONFIG
   ========================================================================= */
const BRAND = { name:"VISIT OMAN", sub:"تحدي توقعات كأس العالم 2026" };

// --- Firebase placeholders: استبدلها ببيانات مشروعك الحقيقية في Firebase Console ---
const FIREBASE_CONFIG = {
  apiKey: "PLACEHOLDER_API_KEY",
  authDomain: "PLACEHOLDER.firebaseapp.com",
  projectId: "PLACEHOLDER_PROJECT_ID",
  storageBucket: "PLACEHOLDER.appspot.com",
  messagingSenderId: "000000000000",
  appId: "PLACEHOLDER_APP_ID"
};

const ADMIN_PASSWORD_DEFAULT = "Oman2026!"; // كلمة مرور افتراضية - عدّلها أو غيّرها من الكود متى أردت

// أدوار البطولة القابلة للتوقع (لا يوجد دور مجموعات ضمن التوقعات)
const WC_STAGES = [
  { id:"r32",  name:"دور الـ32",      icon:"🥅", opensAt:"2026-06-29T12:00:00Z", closesAt:"2026-07-03T23:00:00Z", matchCount:16 },
  { id:"r16",  name:"دور الـ16",      icon:"⚔️", opensAt:"2026-07-03T23:00:00Z", closesAt:"2026-07-07T23:00:00Z", matchCount:8  },
  { id:"qf",   name:"ربع النهائي",    icon:"🔥", opensAt:"2026-07-07T23:00:00Z", closesAt:"2026-07-10T23:00:00Z", matchCount:4  },
  { id:"sf",   name:"نصف النهائي",    icon:"🏟️", opensAt:"2026-07-10T23:00:00Z", closesAt:"2026-07-14T23:00:00Z", matchCount:2  },
  { id:"final",name:"النهائي",        icon:"🏆", opensAt:"2026-07-14T23:00:00Z", closesAt:"2026-07-19T20:00:00Z", matchCount:1  },
];
const STAGE_ORDER = WC_STAGES.map(s=>s.id);
const PREV_STAGE = {r16:"r32", qf:"r16", sf:"qf", final:"sf"};

const WC_SCORING = { knockoutWinner:3, knockoutExactBonus:2 };

// 12 مجموعة × 4 منتخبات (كود الدولة لـ flag-icons، اسم عربي)
const WC_GROUPS = {
  A:[["mx","المكسيك"],["pl","بولندا"],["sa","السعودية"],["ar","الأرجنتين"]],
  B:[["us","الولايات المتحدة"],["gb-wls","ويلز"],["ir","إيران"],["gb-eng","إنجلترا"]],
  C:[["sn","السنغال"],["nl","هولندا"],["qa","قطر"],["ec","الإكوادور"]],
  D:[["fr","فرنسا"],["au","أستراليا"],["dk","الدنمارك"],["tn","تونس"]],
  E:[["es","إسبانيا"],["cr","كوستاريكا"],["de","ألمانيا"],["jp","اليابان"]],
  F:[["be","بلجيكا"],["ca","كندا"],["ma","المغرب"],["hr","كرواتيا"]],
  G:[["br","البرازيل"],["rs","صربيا"],["ch","سويسرا"],["cm","الكاميرون"]],
  H:[["pt","البرتغال"],["gh","غانا"],["uy","الأوروغواي"],["kr","كوريا الجنوبية"]],
  I:[["it","إيطاليا"],["co","كولومبيا"],["eg","مصر"],["ng","نيجيريا"]],
  J:[["dz","الجزائر"],["se","السويد"],["cl","تشيلي"],["no","النرويج"]],
  K:[["om","عُمان"],["iq","العراق"],["jo","الأردن"],["pa","بنما"]],
  L:[["ci","ساحل العاج"],["pe","بيرو"],["gb-sct","اسكتلندا"],["gr","اليونان"]],
};
const GROUP_IDS = Object.keys(WC_GROUPS);
const WC_TEAM_MAP = {};
GROUP_IDS.forEach(g=> WC_GROUPS[g].forEach(([code,name])=> WC_TEAM_MAP[code]={code,name,group:g}));

// شبكة الإطعام للدور الإقصائي
// r32: من نتائج المجموعات (متصدر/وصيف كل مجموعة + أفضل 8 أصحاب مركز ثالث)
const R32_FEED = [
  ["G:A:1","G:B:2"], ["G:B:1","G:A:2"],
  ["G:C:1","G:D:2"], ["G:D:1","G:C:2"],
  ["G:E:1","G:F:2"], ["G:F:1","G:E:2"],
  ["G:G:1","G:H:2"], ["G:H:1","G:G:2"],
  ["G:I:1","G:J:2"], ["G:J:1","G:I:2"],
  ["G:K:1","G:L:2"], ["G:L:1","G:K:2"],
  ["T:1","T:2"], ["T:3","T:4"], ["T:5","T:6"], ["T:7","T:8"],
];
// بقية الأدوار: مصفوفة من [مصدر1، مصدر2] = فهرس مباراة في الدور السابق
const KO_FEED = {
  r16:  [[0,2],[1,3],[4,6],[5,7],[8,10],[9,11],[12,14],[13,15]],
  qf:   [[0,1],[2,3],[4,5],[6,7]],
  sf:   [[0,1],[2,3]],
  final:[[0,1]],
};
const WC_KO_FEED = { r32:R32_FEED, ...KO_FEED };

/* =========================================================================
   SECTION: FIRESTORE INIT (with graceful local fallback)
   ========================================================================= */
let db = null, FIRESTORE_OK = false;
try{
  if(!firebase.apps || !firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
  db = firebase.firestore();
  FIRESTORE_OK = true;
}catch(e){ console.warn("Firebase init failed, running in local-only demo mode.", e); }

// مخزن محلي احتياطي (يُستخدم تلقائياً إذا تعذر الاتصال بـ Firestore، حتى تبقى الصفحة قابلة للتجربة)
const LOCAL_FALLBACK = { predictions: JSON.parse(localStorage.getItem("wc_local_predictions")||"[]"), results: JSON.parse(localStorage.getItem("wc_local_results")||"null") || emptyResults() };
function emptyResults(){
  const groups = {}; GROUP_IDS.forEach(g=> groups[g] = WC_GROUPS[g].map(([code])=>({code,W:0,D:0,L:0,GF:0,GA:0})));
  return { groups, groupsLocked:false, knockout:{ r32:Array(16).fill(null), r16:Array(8).fill(null), qf:Array(4).fill(null), sf:Array(2).fill(null), final:Array(1).fill(null) }, lastUpdate:null, forceOpen:{}, forceClose:{} };
}

/* =========================================================================
   SECTION: STATE
   ========================================================================= */
const S = {
  theme: localStorage.getItem("wc_theme") || "light",
  user: JSON.parse(localStorage.getItem("wc_user")||"null"), // {id,name}
  tab: "predict", // predict | leaderboard | admin

let suppressFullRerenderForInputs = false;

function subscribeLive(){
  if(!FIRESTORE_OK){
    S.predictions = LOCAL_FALLBACK.predictions;
    S.results = LOCAL_FALLBACK.results;
    render();
    return;
  }
  db.collection("calendar").doc("wc_predictions").onSnapshot(snap=>{
    const data = snap.exists ? snap.data() : {value:[]};
    S.predictions = data.value || [];
    if(suppressFullRerenderForInputs){ patchLeaderboardOnly(); } else { render(); }
  }, err=>console.warn("predictions snapshot err", err));

  db.collection("calendar").doc("wc_results").onSnapshot(snap=>{
    const data = snap.exists ? snap.data() : {value:emptyResults()};
    S.results = data.value || emptyResults();
    if(suppressFullRerenderForInputs){ patchScoreboardOnly(); } else { render(); }
  }, err=>console.warn("results snapshot err", err));
}

}

/* =========================================================================
   SECTION: HELPERS - GROUPS / QUALIFICATION
   ========================================================================= */
function groupStandings(g){
  const rows = S.results.groups[g].map(t=>{
    const code=t.code, info=WC_TEAM_MAP[code];
    const pts = t.W*3 + t.D;
    const gd = (t.GF||0)-(t.GA||0);
    return {code, name:info.name, W:t.W,D:t.D,L:t.L,GF:t.GF,GA:t.GA, pts, gd};
  });
  rows.sort((a,b)=> b.pts-a.pts || b.gd-a.gd || b.GF-a.GF || a.name.localeCompare(b.name,'ar'));
  return rows;
}
function allGroupsEntered(){
  return GROUP_IDS.every(g=>{
    const t = S.results.groups[g];
    return t.every(row => (row.W+row.D+row.L) > 0);
  }) || S.results.groupsLocked;
}
function bestThirdPlaced(){
  const thirds = GROUP_IDS.map(g=>{
    const st = groupStandings(g);
    return {...st[2], group:g};
  });
  thirds.sort((a,b)=> b.pts-a.pts || b.gd-a.gd || b.GF-a.GF);
  return thirds.slice(0,8);
}
function resolveSlot(slot){
  // slot مثل "G:A:1" أو "T:3"
  if(!allGroupsEntered()) return null;
  const [type,a,b] = slot.split(":");
  if(type==="G"){
    const st = groupStandings(a);
    const row = st[Number(b)-1];
    return row ? {code:row.code, name:row.name} : null;
  }else{
    const thirds = bestThirdPlaced();
    const row = thirds[Number(a)-1];
    return row ? {code:row.code, name:row.name, group:row.group} : null;
  }
}
function placeholderLabel(slot){
  const [type,a,b] = slot.split(":");
  if(type==="G") return (b==="1"?"متصدر المجموعة ":"وصيف المجموعة ") + a;
  return "أفضل ثالث #" + a;
}

/* =========================================================================
   SECTION: HELPERS - MATCH RESOLUTION (names, scores, status)
   ========================================================================= */
function matchTeams(stageId, idx){
  const ko = S.results.knockout[stageId][idx];
  if(stageId==="r32"){
    const [s1,s2] = WC_KO_FEED.r32[idx];
    const home = ko && ko.home ? {code:ko.home,name:WC_TEAM_MAP[ko.home]?.name||ko.home} : resolveSlot(s1);
    const away = ko && ko.away ? {code:ko.away,name:WC_TEAM_MAP[ko.away]?.name||ko.away} : resolveSlot(s2);
    return { home, away, homeLabel: home?home.name:placeholderLabel(s1), awayLabel: away?away.name:placeholderLabel(s2) };
  }
  const [i1,i2] = WC_KO_FEED[stageId][idx];
  const prevStage = PREV_STAGE[stageId];
  const w1 = matchWinner(prevStage,i1), w2 = matchWinner(prevStage,i2);
  const t1 = w1 ? {code:w1, name:WC_TEAM_MAP[w1]?.name||w1} : null;
  const t2 = w2 ? {code:w2, name:WC_TEAM_MAP[w2]?.name||w2} : null;
  const fallback1 = "الفائز من المباراة "+(i1+1)+" ("+stageDisplay(prevStage)+")";
  const fallback2 = "الفائز من المباراة "+(i2+1)+" ("+stageDisplay(prevStage)+")";
  return { home:t1, away:t2, homeLabel: t1?t1.name:fallback1, awayLabel: t2?t2.name:fallback2 };
}
function stageDisplay(id){ return WC_STAGES.find(s=>s.id===id)?.name || id; }
function matchWinner(stageId, idx){
  const ko = S.results.knockout[stageId][idx];
  if(!ko || ko.homeScore===null || ko.homeScore===undefined || ko.awayScore===null || ko.awayScore===undefined) return null;
  if(ko.homeScore > ko.awayScore) return ko.home;
  if(ko.awayScore > ko.homeScore) return ko.away;
  if(ko.penWinner) return ko.penWinner;
  return null;
}
function matchHasResult(stageId, idx){
  const ko = S.results.knockout[stageId][idx];
  return !!(ko && ko.homeScore!=null && ko.awayScore!=null);
}
function matchKickoff(stageId, idx){
  const ko = S.results.knockout[stageId][idx];
  return ko && ko.kickoff ? ko.kickoff : null;
}
function matchStarted(stageId, idx){
  const kt = matchKickoff(stageId, idx);
  if(kt) return new Date(kt).getTime() <= S.now;
  return false;
}
function stageStatus(stageId){
  const stage = WC_STAGES.find(s=>s.id===stageId);
  if(S.results.forceClose && S.results.forceClose[stageId]) return "closed";
  if(S.results.forceOpen && S.results.forceOpen[stageId]) return "open";
  if(stageId==="r32"){
    if(!allGroupsEntered()) return "upcoming";
  }else{
    const prevDone = S.results.knockout[PREV_STAGE[stageId]].every(m=>m && m.homeScore!=null);
    if(!prevDone) return "upcoming";
  }
  const n = stage.matchCount;
  let allStarted = true;
  for(let i=0;i<n;i++){ if(!matchStarted(stageId,i)){ allStarted=false; break; } }
  if(allStarted){
    // افتراضي احتياطي إن لم تُحدد مواعيد فعلية
    const anyKickoff = Array.from({length:n}, (_,i)=>matchKickoff(stageId,i)).some(Boolean);
    if(anyKickoff) return "closed";
  }
  if(Date.now() > new Date(stage.closesAt).getTime() && !Array.from({length:n}, (_,i)=>matchKickoff(stageId,i)).some(Boolean)){
    return "closed";
  }
  return "open";
}
function nextCloseTarget(){
  for(const stage of WC_STAGES){
    const st = stageStatus(stage.id);
    if(st==="open"){
      // أقرب موعد إغلاق: أقرب kickoff قادم أو closesAt الاحتياطي
      let soonest = new Date(stage.closesAt).getTime();
      for(let i=0;i<stage.matchCount;i++){
        const kt = matchKickoff(stage.id,i);
        if(kt && !matchStarted(stage.id,i)) soonest = Math.min(soonest, new Date(kt).getTime());
      }
      return {stage, target:soonest};
    }
  }
  return null;
}

/* =========================================================================
   SECTION: SCORING (pure functions)
   ========================================================================= */
function pointsForMatch(stageId, idx, pred){
  if(!pred) return 0;
  const ko = S.results.knockout[stageId][idx];
  if(!ko || ko.homeScore==null || ko.awayScore==null) return 0;
  const actualWinner = matchWinner(stageId, idx);
  let predWinner = null;
  if(pred.home > pred.away) predWinner = "home";
  else if(pred.away > pred.home) predWinner = "away";
  else predWinner = pred.penWinner==="home" ? "home" : pred.penWinner==="away" ? "away" : null;
  const realSide = ko.home===actualWinner ? "home" : ko.away===actualWinner ? "away" : null;
  let pts = 0;
  if(predWinner && realSide && predWinner===realSide) pts += WC_SCORING.knockoutWinner;
  if(pred.home===ko.homeScore && pred.away===ko.awayScore) pts += WC_SCORING.knockoutExactBonus;
  return pts;
}
function stagePoints(participant, stageId){
  let total=0;
  const n = WC_STAGES.find(s=>s.id===stageId).matchCount;
  for(let i=0;i<n;i++){
    const pred = participant.knockout && participant.knockout[stageId] ? participant.knockout[stageId][i] : null;
    total += pointsForMatch(stageId, i, pred);
  }
  return total;
}
function totalPoints(participant){
  return STAGE_ORDER.reduce((sum,st)=> sum + stagePoints(participant, st), 0);
}

/* =========================================================================
   SECTION: DRAFT MANAGEMENT
   ========================================================================= */
function loadDraftFromSaved(){
  const mine = S.predictions.find(p=>p.id===S.user?.id);
  S.draft = {};
  if(mine && mine.knockout){
    STAGE_ORDER.forEach(st=>{
      (mine.knockout[st]||[]).forEach((m,i)=>{ if(m) S.draft[st+"__"+i] = {...m}; });
    });
  }
}
function getDraft(stageId, idx){ return S.draft[stageId+"__"+idx] || {home:"",away:"",penWinner:null}; }
function setDraft(stageId, idx, patch){
  const key = stageId+"__"+idx;
  S.draft[key] = {...getDraft(stageId,idx), ...patch};
}
function draftToKnockoutObj(){
  const obj = {}; STAGE_ORDER.forEach(st=>{
    const stage = WC_STAGES.find(s=>s.id===st);
    obj[st] = Array.from({length:stage.matchCount}, (_,i)=>{
      const d = S.draft[st+"__"+i];
      if(!d || d.home===""||d.home==null||d.away===""||d.away==null) return null;
      return { home:Number(d.home), away:Number(d.away), penWinner: d.home===d.away ? (d.penWinner||null) : null };
    });
  });
  return obj;
}
function stageComplete(stageId){
  const stage = WC_STAGES.find(s=>s.id===stageId);
  for(let i=0;i<stage.matchCount;i++){
    if(matchStarted(stageId,i)) continue; // المباريات المنطلقة فعلاً تُستثنى من شرط الإكمال
    const d = S.draft[stageId+"__"+i];
    if(!d || d.home===""||d.home==null||d.away===""||d.away==null) return false;
    if(Number(d.home)===Number(d.away) && !d.penWinner) return false;
  }
  return true;
}
function allOpenStagesComplete(){
  return WC_STAGES.filter(s=>stageStatus(s.id)==="open").every(s=>stageComplete(s.id));
}

function fmtCountdown(ms){
  if(ms<=0) return {d:0,h:0,m:0,s:0};
  const s=Math.floor(ms/1000)%60, m=Math.floor(ms/60000)%60, h=Math.floor(ms/3600000)%24, d=Math.floor(ms/86400000);
  return {d,h,m,s};
}

    html += `<div class="total-bar" id="totalBar">
      <span>إجمالي نقاطك الحالي (حسب المسودة الحالية)</span>

    <button class="tab-btn ${S.bracketView==='bracket'?'active':''}" data-bview="bracket">🌳 قوس بصري</button>

  if(S.bracketView==="list"){

function mergeDraftIntoSaved(mine){
  const merged = JSON.parse(JSON.stringify(mine.knockout||{}));
  STAGE_ORDER.forEach(st=>{
    const stage = WC_STAGES.find(s=>s.id===st);
    if(!merged[st]) merged[st] = Array(stage.matchCount).fill(null);
    for(let i=0;i<stage.matchCount;i++){
      const d = S.draft[st+"__"+i];
      if(d && d.home!=="" && d.home!=null && d.away!=="" && d.away!=null){
        merged[st][i] = {home:Number(d.home), away:Number(d.away), penWinner: Number(d.home)===Number(d.away)?(d.penWinner||null):null};
      }
    }
  });
  return merged;
}

function matchCardHtml(stageId, idx, status){
  const {home,away,homeLabel,awayLabel} = matchTeams(stageId, idx);
  const started = matchStarted(stageId, idx);
  const locked = status==="closed" || started || S.guest;
  const d = getDraft(stageId, idx);
  const hasResult = matchHasResult(stageId, idx);
  const kt = matchKickoff(stageId, idx);
  const flag = code => code ? `<span class="fi fi-${code.replace('gb-','gb-')}" style="width:22px;height:16px;display:inline-block;"></span>` : `<span style="width:22px;height:16px;display:inline-block;background:var(--line);border-radius:3px;"></span>`;

  let scoreArea;
  if(locked){
    const val = d.home!==""&&d.home!=null ? `${d.home} - ${d.away}` : "—";
    scoreArea = `<div class="score-inputs"><b>${val}</b></div>`;
  }else{
    scoreArea = `<div class="score-inputs">
      <input type="number" min="0" max="20" value="${d.home??''}" data-stage="${stageId}" data-idx="${idx}" data-side="home" class="scoreInput">
      <span class="score-vs">:</span>
      <input type="number" min="0" max="20" value="${d.away??''}" data-stage="${stageId}" data-idx="${idx}" data-side="away" class="scoreInput">
    </div>`;
  }
  let penRow = "";
  if(!locked && d.home!=="" && d.away!=="" && d.home!=null && d.away!=null && Number(d.home)===Number(d.away)){
    penRow = `<div class="pen-row">
      <span>تعادل؟ اختر الفائز بركلات الترجيح:</span>
      <div class="pen-choice">
        <button data-stage="${stageId}" data-idx="${idx}" data-pen="home" class="${d.penWinner==='home'?'sel':''}">${homeLabel}</button>
        <button data-stage="${stageId}" data-idx="${idx}" data-pen="away" class="${d.penWinner==='away'?'sel':''}">${awayLabel}</button>
      </div>
    </div>`;
  }
  let pollRow = "";
  if((locked || hasResult) && S.predictions.length){
    const stats = pollStats(stageId, idx);
    if(stats.total>0){
      pollRow = `<div class="poll-row">توقّع الجمهور (${stats.total} صوت)
        <div class="poll-bar">
          <span style="width:${stats.homePct}%;background:var(--success);" title="فوز ${homeLabel}"></span>
          <span style="width:${stats.drawPct}%;background:var(--gold);" title="تعادل"></span>
          <span style="width:${stats.awayPct}%;background:var(--accent);" title="فوز ${awayLabel}"></span>
        </div>
      </div>`;
    }
  }
  return `<div class="match-card">
    ${started?`<span class="locked-tag">انطلقت</span>`:""}
    <div class="match-meta">
      <span>مباراة ${idx+1}</span>
      <span>${kt?fmtDateLocal(kt):"موعد لاحق"}</span>
    </div>
    <div class="match-row">
      <div class="team">${flag(home?.code)}<span class="name ${home?'':'tbd'}">${homeLabel}</span></div>
      ${scoreArea}
      <div class="team right">${flag(away?.code)}<span class="name ${away?'':'tbd'}">${awayLabel}</span></div>
    </div>
    ${penRow}
    ${pollRow}
  </div>`;
}
function pollStats(stageId, idx){
  let home=0,draw=0,away=0,total=0;
  S.predictions.forEach(p=>{
    const m = p.knockout && p.knockout[stageId] ? p.knockout[stageId][idx] : null;
    if(!m) return;
    total++;
    if(m.home>m.away) home++; else if(m.away>m.home) away++; else draw++;
  });
  if(!total) return {total:0,homePct:0,drawPct:0,awayPct:0};
  return {total, homePct:Math.round(home/total*100), drawPct:Math.round(draw/total*100), awayPct:Math.round(away/total*100)};
}

function bracketHtml(){
  let cols = "";
  WC_STAGES.forEach(stage=>{
    cols += `<div class="bracket-col">
      <div class="col-title">${stage.icon} ${stage.name}</div>
      ${Array.from({length:stage.matchCount},(_,i)=>{
        const {home,away,homeLabel,awayLabel} = matchTeams(stage.id,i);
        const ko = S.results.knockout[stage.id][i];
        const winner = matchWinner(stage.id,i);
        return `<div class="b-match">
          <div class="b-team ${winner && winner===home?.code ?'winner':''}"><span class="nm">${flagTiny(home?.code)}<span>${homeLabel}</span></span><b>${ko&&ko.homeScore!=null?ko.homeScore:""}</b></div>
          <div class="b-divider"></div>
          <div class="b-team ${winner && winner===away?.code ?'winner':''}"><span class="nm">${flagTiny(away?.code)}<span>${awayLabel}</span></span><b>${ko&&ko.awayScore!=null?ko.awayScore:""}</b></div>
        </div>`;
      }).join("")}
    </div>`;
  });
  return `<div class="bracket">${cols}</div>`;
}
function flagTiny(code){ return code? `<span class="fi fi-${code}" style="width:16px;height:12px;display:inline-block;"></span>`:""; }

   SECTION: LEADERBOARD TAB
   ========================================================================= */
function computeRanking(stageFilter){
  const rows = S.predictions.map(p=>({
    id:p.id, name:p.name,
    pts: stageFilter==="overall" ? totalPoints(p) : stagePoints(p, stageFilter)
  }));
  rows.sort((a,b)=> b.pts-a.pts || a.name.localeCompare(b.name,'ar'));
  let rank=0,lastPts=null;
  rows.forEach((r,i)=>{ if(r.pts!==lastPts){ rank=i+1; lastPts=r.pts; } r.rank=rank; });
  return rows;
}
function leaderboardTabHtml(){
  const rows = computeRanking(S.lbSub);
  const me = !S.guest ? rows.find(r=>r.id===S.user.id) : null;
  let html = "";
  if(me){
    html += `<div class="me-card">
      <div style="font-size:34px;">${me.rank===1?'🥇':me.rank===2?'🥈':me.rank===3?'🥉':'🎖️'}</div>
      <div>
        <div style="font-size:13px;opacity:.85;">ترتيبك الحالي</div>
        <div class="big">المركز ${me.rank} • ${me.pts} نقطة</div>
      </div>
      <button class="btn gold" id="shareBtn" style="margin-right:auto;">📤 مشاركة بطاقتي</button>
    </div>`;
  }
  html += `<div class="lb-subtabs">
    <button class="${S.lbSub==='overall'?'active':''}" data-lbsub="overall">الإجمالي</button>
    ${WC_STAGES.map(s=>`<button class="${S.lbSub===s.id?'active':''}" data-lbsub="${s.id}">${s.icon} ${s.name}</button>`).join("")}
  </div>`;
  html += `<div class="card">`;
  if(!rows.length){
    html += `<div class="empty">لا توجد توقعات مسجَّلة بعد. كن أول من يشارك!</div>`;
  }else{
    rows.forEach(r=>{
      const delta = S.prevTotals[r.id+"_"+S.lbSub]!=null ? r.pts - S.prevTotals[r.id+"_"+S.lbSub] : 0;
      html += `<div class="lb-row ${!S.guest && r.id===S.user.id?'me':''}">
        <div class="lb-rank">${r.rank===1?'🥇':r.rank===2?'🥈':r.rank===3?'🥉':r.rank}</div>
        <div class="lb-avatar">${escapeHtml(r.name.slice(0,1))}</div>
        <div class="lb-name">${escapeHtml(r.name)}</div>
        <div class="lb-pts">${delta>0?`<span class="lb-delta">+${delta}</span>`:""}${r.pts}</div>
      </div>`;
    });
  }
  html += `</div>`;
  return html;
}
function snapshotPrevTotals(){
  WC_STAGES.concat([{id:"overall"}]).forEach(()=>{});
  ["overall",...STAGE_ORDER].forEach(key=>{
    computeRanking(key).forEach(r=>{ S.prevTotals[r.id+"_"+key] = r.pts; });
  });
}

/* =========================================================================

   ========================================================================= */
function generateShareCard(){
  const rows = computeRanking("overall");
  const me = rows.find(r=>r.id===S.user.id);
  if(!me) return;
  const canvas = document.getElementById("shareCanvas");
  const ctx = canvas.getContext("2d");
  const grad = ctx.createLinearGradient(0,0,900,560);
  grad.addColorStop(0,"#0B5351"); grad.addColorStop(1,"#C1502E");
  ctx.fillStyle = grad; ctx.fillRect(0,0,900,560);
  ctx.fillStyle = "rgba(255,255,255,.08)";
  for(let i=0;i<6;i++){ ctx.beginPath(); ctx.arc(120+i*150, 60, 70,0,Math.PI*2); ctx.fill(); }
  ctx.textAlign="center";
  ctx.fillStyle="#fff";
  ctx.font="bold 26px Tajawal, sans-serif";
  ctx.fillText("VISIT OMAN — تحدي توقعات كأس العالم 2026", 450, 80);
  const medal = me.rank===1?"🥇":me.rank===2?"🥈":me.rank===3?"🥉":"🎖️";
  ctx.font="80px serif"; ctx.fillText(medal, 450, 220);
  ctx.font="bold 44px Tajawal, sans-serif"; ctx.fillText(me.name, 450, 300);
  ctx.font="bold 30px Tajawal, sans-serif"; ctx.fillText("المركز "+me.rank+"  •  "+me.pts+" نقطة", 450, 350);
  const lines = me.rank===1?"بطل التوقعات بلا منازع! 🏆":me.rank<=3?"على منصة التتويج! استمر 🔥":me.rank<=10?"في المقدمة، واصل التألق ⚡":"لم تنتهِ البطولة بعد، عُد بقوة 💪";
  ctx.font="22px Tajawal, sans-serif"; ctx.fillText(lines, 450, 410);
  ctx.font="16px Tajawal, sans-serif"; ctx.fillStyle="rgba(255,255,255,.8)";
  ctx.fillText("شارك توقعاتك على #VisitOmanWC2026", 450, 510);

  const dataUrl = canvas.toDataURL("image/png");
  showSharePreview(dataUrl);
}
function showSharePreview(dataUrl){
  const wrap = document.createElement("div");
  wrap.style.cssText = "position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px;";
  wrap.innerHTML = `<div class="card" style="max-width:420px;text-align:center;">
    <img src="${dataUrl}" style="width:100%;border-radius:12px;margin-bottom:12px;">
    <div class="share-actions" style="justify-content:center;">
      <a class="btn sm" id="dlShare" href="${dataUrl}" download="visit-oman-wc-card.png">⬇️ تنزيل</a>
      <button class="btn sm secondary" id="copyShare">📋 نسخ</button>
      <button class="btn sm secondary" id="navShare">📤 مشاركة</button>
      <button class="btn sm secondary" id="closeShare">✖️ إغلاق</button>
    </div>
  </div>`;
  document.body.appendChild(wrap);
  wrap.querySelector("#closeShare").onclick = ()=> wrap.remove();
  wrap.querySelector("#copyShare").onclick = async ()=>{
    try{
      const blob = await (await fetch(dataUrl)).blob();
      await navigator.clipboard.write([new ClipboardItem({'image/png':blob})]);
      showToast("تم النسخ إلى الحافظة");
    }catch(e){ showToast("تعذر النسخ على هذا المتصفح"); }
  };
  wrap.querySelector("#navShare").onclick = async ()=>{
    try{
      const blob = await (await fetch(dataUrl)).blob();
      const file = new File([blob], "wc-card.png", {type:"image/png"});
      if(navigator.share) await navigator.share({files:[file], title:"بطاقتي في تحدي كأس العالم"});
      else showToast("المشاركة غير مدعومة على هذا الجهاز");
    }catch(e){}
  };
}

/* =========================================================================
   SECTION: EVENTS
   ========================================================================= */
function bindEvents(){
  const themeBtn = document.getElementById("themeToggle");
  if(themeBtn) themeBtn.onclick = ()=>{ S.theme = S.theme==="dark"?"light":"dark"; localStorage.setItem("wc_theme",S.theme); render(); };

  const logoutBtn = document.getElementById("logoutBtn");
  if(logoutBtn) logoutBtn.onclick = ()=>{ if(confirm("تسجيل خروج؟")){ localStorage.removeItem("wc_user"); S.user=null; S.guest=false; render(); } };

  const joinBtn = document.getElementById("joinBtn");
  if(joinBtn) joinBtn.onclick = ()=>{
    const input = document.getElementById("nameInput");
    const name = input.value.trim();
    if(!name){ showToast("الرجاء إدخال الاسم"); return; }
    const existing = S.predictions.find(p=>p.name===name);
    const user = existing ? {id:existing.id, name} : {id:uid(), name};
    S.user = user; S.guest=false;
    localStorage.setItem("wc_user", JSON.stringify(user));
    loadDraftFromSaved();
    render();
  };
  document.querySelectorAll(".suggest-chip").forEach(c=> c.onclick = ()=>{ document.getElementById("nameInput").value = c.dataset.name; });
  const guestBtn = document.getElementById("guestBtn");
  if(guestBtn) guestBtn.onclick = ()=>{ S.guest = true; S.user = S.user || {id:"guest", name:"ضيف"}; render(); };

  document.querySelectorAll("[data-tab]").forEach(b=> b.onclick = ()=>{ S.tab=b.dataset.tab; render(); });
  document.querySelectorAll("[data-bview]").forEach(b=> b.onclick = ()=>{ S.bracketView=b.dataset.bview; localStorage.setItem("wc_bracket_view",S.bracketView); render(); });
  document.querySelectorAll("[data-lbsub]").forEach(b=> b.onclick = ()=>{ S.lbSub=b.dataset.lbsub; render(); });

  document.querySelectorAll(".scoreInput").forEach(inp=>{
    inp.oninput = ()=>{
      setDraft(inp.dataset.stage, inp.dataset.idx, {[inp.dataset.side]: inp.value});
      suppressFullRerenderForInputs = true;
      patchTotalBar();
      // إعادة رسم بطاقة المباراة فقط لإظهار صف الترجيح إن لزم، دون فقدان تركيز الحقل الآخر
      const cardsGrid = inp.closest(".grid");
      if(cardsGrid){
        const idx = Number(inp.dataset.idx), stage = inp.dataset.stage;
        const card = inp.closest(".match-card");
        const status = stageStatus(stage);
        const html = matchCardHtml(stage, idx, status);
        const temp = document.createElement("div"); temp.innerHTML = html;
        const newPenRow = temp.querySelector(".pen-row");
        const oldPenRow = card.querySelector(".pen-row");
        if(newPenRow && !oldPenRow){ card.appendChild(newPenRow); bindPenButtons(); }
        else if(!newPenRow && oldPenRow){ oldPenRow.remove(); }
      }
      setTimeout(()=> suppressFullRerenderForInputs=false, 50);
    };
  });
  bindPenButtons();
  function bindPenButtons(){
    document.querySelectorAll(".pen-row .pen-choice button[data-pen]").forEach(btn=>{
      btn.onclick = ()=>{ setDraft(btn.dataset.stage, btn.dataset.idx, {penWinner: btn.dataset.pen}); render(); };
    });
  }

  const saveBtn = document.getElementById("saveBtn");
  if(saveBtn) saveBtn.onclick = async ()=>{
    saveBtn.disabled = true; saveBtn.textContent = "جارٍ الحفظ...";
    const list = [...S.predictions.filter(p=>p.id!==S.user.id)];
    list.push({ id:S.user.id, name:S.user.name, ts:new Date().toISOString(), groups:{}, knockout: draftToKnockoutObj() });
    await savePredictions(list);
    showToast("تم حفظ توقعاتك بنجاح ✅");
    render();
  };

  // admin
  const adminLoginBtn = document.getElementById("adminLoginBtn");
  if(adminLoginBtn) adminLoginBtn.onclick = ()=>{
    const pass = document.getElementById("adminPass").value;
    const saved = localStorage.getItem("wc_admin_pass") || ADMIN_PASSWORD_DEFAULT;
    if(pass===saved){ S.adminAuthed=true; localStorage.setItem("wc_admin_ok","1"); render(); }
    else showToast("كلمة المرور غير صحيحة");
  };
  const adminLogoutBtn = document.getElementById("adminLogoutBtn");
  if(adminLogoutBtn) adminLogoutBtn.onclick = ()=>{ S.adminAuthed=false; localStorage.removeItem("wc_admin_ok"); render(); };

  document.querySelectorAll(".grpInput").forEach(inp=>{
    inp.onchange = async ()=>{
      const {g,c,f} = inp.dataset;
      const row = S.results.groups[g].find(x=>x.code===c);
      row[f] = Number(inp.value)||0;
      await saveResults(S.results);
      showToast("تم تحديث نتائج المجموعة");
    };
  });
  const groupsLockBtn = document.getElementById("groupsLockBtn");
  if(groupsLockBtn) groupsLockBtn.onclick = async ()=>{
    S.results.groupsLocked = !S.results.groupsLocked;
    await saveResults(S.results);
    render();
  };

  document.querySelectorAll(".adminScore").forEach(inp=>{
    inp.onchange = async ()=>{
      const {stage,idx,side} = inp.dataset;
      const arr = S.results.knockout[stage];
      if(!arr[idx]) arr[idx] = {home:null,away:null,homeScore:null,awayScore:null,penWinner:null,kickoff:null};
      const teams = matchTeams(stage, Number(idx));
      arr[idx].home = arr[idx].home || teams.home?.code || null;
      arr[idx].away = arr[idx].away || teams.away?.code || null;
      arr[idx][side+"Score"] = inp.value===""?null:Number(inp.value);
      await saveResults(S.results);
      showToast("تم تحديث نتيجة المباراة");
      render();
    };
  });
  document.querySelectorAll("[data-penadmin]").forEach(btn=>{
    btn.onclick = async ()=>{
      const {stage,idx} = btn.dataset;
      const arr = S.results.knockout[stage];
      if(!arr[idx]) arr[idx] = {home:null,away:null,homeScore:null,awayScore:null,penWinner:null,kickoff:null};
      arr[idx].penWinner = btn.dataset.penadmin;
      await saveResults(S.results);
      render();
    };
  });
  document.querySelectorAll(".kickoffInput").forEach(inp=>{
    inp.onchange = async ()=>{
      const {stage,idx} = inp.dataset;
      const arr = S.results.knockout[stage];
      if(!arr[idx]) arr[idx] = {home:null,away:null,homeScore:null,awayScore:null,penWinner:null,kickoff:null};
      arr[idx].kickoff = inp.value ? new Date(inp.value).toISOString() : null;
      await saveResults(S.results);
      showToast("تم تحديد موعد الانطلاق");
      render();
    };
  });
  document.querySelectorAll(".forceBtn").forEach(btn=>{
    btn.onclick = async ()=>{
      const {stage,mode} = btn.dataset;
      S.results.forceOpen = S.results.forceOpen||{}; S.results.forceClose = S.results.forceClose||{};
      if(mode==="open"){ S.results.forceOpen[stage]=true; S.results.forceClose[stage]=false; }
      else { S.results.forceClose[stage]=true; S.results.forceOpen[stage]=false; }
      await saveResults(S.results);
      render();
    };
  });
  document.querySelectorAll(".delPredBtn").forEach(btn=>{
    btn.onclick = async ()=>{
      if(!confirm("حذف هذا المشارك نهائياً؟")) return;
      const list = S.predictions.filter(p=>p.id!==btn.dataset.id);
      await savePredictions(list);
      render();
    };
  });
  document.querySelectorAll(".editPredBtn").forEach(btn=>{
    btn.onclick = ()=>{
      const p = S.predictions.find(x=>x.id===btn.dataset.id);
      if(!p) return;
      S.user = {id:p.id, name:p.name}; S.guest=false; S.tab="predict";
      loadDraftFromSaved();
      showToast("تعدّل الآن نيابة عن: " + p.name);
      render();
    };
  });

  const shareBtn = document.getElementById("shareBtn");
  if(shareBtn) shareBtn.onclick = generateShareCard;
}

  if(!el || S.guest) return;
  const mine = S.predictions.find(p=>p.id===S.user.id) || {knockout:{}};
  const cur = totalPoints({...mine, knockout: mergeDraftIntoSaved(mine)});
  el.textContent = cur + " نقطة";

  if(S.tab==="leaderboard"){ snapshotPrevTotalsIfNeeded(); render(); }
  else { patchTotalBar(); }

function snapshotPrevTotalsIfNeeded(){ if(!prevSnapshotDone){ snapshotPrevTotals(); prevSnapshotDone=true; } }

/* =========================================================================
   SECTION: UTIL
   ========================================================================= */
function pad(n){ return String(n).padStart(2,"0"); }
function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c])); }
function fmtDateLocal(iso){
  try{
    const d = new Date(iso);
    return d.toLocaleString("ar", {dateStyle:"medium", timeStyle:"short"});
  }catch(e){ return iso; }
}

/* =========================================================================
   SECTION: TICKER (countdown + status refresh every second/minute)
   ========================================================================= */
let countdownTimer = null;
function startTicker(){
  if(countdownTimer) clearInterval(countdownTimer);
  countdownTimer = setInterval(()=>{
    S.now = Date.now();
    const numsEl = document.getElementById("countdownNums");
    const bar = document.getElementById("countdownBar");
    if(numsEl && bar){
      const target = Number(bar.dataset.target);
      const f = fmtCountdown(target - S.now);
      numsEl.innerHTML = `
        <div><div class="n">${f.d}</div><div class="u">يوم</div></div>
        <div><div class="n">${pad(f.h)}</div><div class="u">ساعة</div></div>
        <div><div class="n">${pad(f.m)}</div><div class="u">دقيقة</div></div>
        <div><div class="n">${pad(f.s)}</div><div class="u">ثانية</div></div>`;
    }
  }, 1000);
}
document.addEventListener("visibilitychange", ()=>{
  if(document.hidden && countdownTimer){ clearInterval(countdownTimer); countdownTimer=null; }
  else if(!document.hidden && !countdownTimer){ startTicker(); }
});

/* =========================================================================
   SECTION: INIT
   ========================================================================= */
(function init(){
  S.guest = false;
  subscribeLive();
  if(S.user) loadDraftFromSaved();
  render();
  startTicker();
})();
</script>
